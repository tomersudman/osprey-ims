<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UAS Manager">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UAS Maintenance Manager — Hermes 900</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#161b22;--bg4:#21262d;--bg5:#30363d;
  --gold:#388bfd;--gold2:rgba(31,111,235,.13);--gold3:rgba(56,139,253,.4);
  --red:#e05555;--red2:rgba(224,85,85,.18);--red3:rgba(224,85,85,.38);
  --orange:#d97830;--orange2:rgba(217,120,48,.18);--orange3:rgba(217,120,48,.36);
  --yellow:#c9a020;--yellow2:rgba(201,160,32,.18);--yellow3:rgba(201,160,32,.36);
  --green:#2ea86b;--green2:rgba(46,168,107,.18);--orange:#d97830;--green3:rgba(46,168,107,.34);
  --blue:#4a90d9;--blue2:rgba(74,144,217,.15);
  --border:#262d36;--border2:#3a434e;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --font:'Inter',sans-serif;--r:6px;--r2:9px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px;overflow:hidden}
.content td{color:#d0daf0;font-size:12px}
.content td.dim{color:#c0cce0!important;font-size:12px!important}
.content td.mono{color:#aab8d0!important;font-size:12px!important}
.content td.ell,.content td.ell-wide{color:#c0cce0!important;font-size:12px!important}
.app{display:flex;flex-direction:column;height:100vh}
.nav{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;min-height:62px;padding:0 16px}
.brand{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid var(--border);flex-shrink:0}
.brand-t{font-size:23px;font-weight:900;letter-spacing:-.03em;color:#e6edf3;line-height:1}
.brand-s{font-size:9.5px;color:#58a6ff;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-top:2px}
.nav-scroll{display:flex;flex:1;overflow-x:auto}.nav-scroll::-webkit-scrollbar{display:none}
.tab{padding:5px 10px;margin:0 1px;display:flex;align-items:center;cursor:pointer;font-size:11.5px;font-weight:500;color:var(--text3);border:none;border-radius:6px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.on{color:#fff;background:rgba(74,158,255,.14);border:1px solid rgba(74,158,255,.45);border-radius:8px}
.nav-btns{display:flex;align-items:center;gap:5px;padding:0 10px;border-left:1px solid var(--border);flex-shrink:0}
.nbtn{padding:4px 9px;border-radius:var(--r);border:1px solid var(--border2);font-size:9px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.05);color:var(--text2);font-family:var(--font);letter-spacing:.03em;transition:all .12s;white-space:nowrap}
.nbtn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.nbtn.gold{background:var(--gold2);color:var(--gold);border-color:var(--gold3)}
.content{flex:1;overflow-y:auto;padding:14px}
.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;max-width:100%}
.ph-title{font-size:24px;font-weight:700;color:#f0f4fa;letter-spacing:-.02em;line-height:1.1}
.ph-sub{font-size:11.5px;color:var(--text3);margin-top:5px;letter-spacing:0;text-transform:none}
.ph-r{display:flex;gap:5px;flex-wrap:wrap}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:10px}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:9px 11px}
.sc-l{font-size:8px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.sc-v{font-size:19px;font-weight:700;color:var(--text)}
.sc-v.r{color:var(--red)}.sc-v.y{color:var(--yellow)}.sc-v.g{color:var(--green)}.sc-v.gold{color:var(--gold)}
.sr-lg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px}
.sr-lg .sc-l{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.sr-lg .sc-v{font-size:23px;font-weight:700;color:var(--text)}
.ov-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;align-items:flex-start;margin-bottom:10px;justify-content:center;flex-wrap:wrap}
.ov-grid::-webkit-scrollbar{height:3px}.ov-grid::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.ov-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;flex-shrink:0}
.ov-block-hdr{background:#1b212b;padding:8px 12px;font-size:13px;font-weight:800;color:#f0f4fa;letter-spacing:.06em;text-transform:uppercase;text-align:center;border-bottom:1px solid var(--border)}
.pvt-lg{border-collapse:collapse;font-size:12px}
.pvt-lg th.lh{background:#10151d;color:var(--text3);font-size:10px;font-weight:600;padding:7px 10px;border:none;border-bottom:1px solid var(--border2);border-right:1px solid var(--border);white-space:nowrap;text-align:left;letter-spacing:.05em;text-transform:uppercase}
.pvt-lg th.ch{background:#10151d;color:var(--text);font-weight:700;padding:7px 9px;border:none;border-bottom:1px solid var(--border2);text-align:center;white-space:nowrap;min-width:82px}
.pvt-lg th.ch .t{font-size:13px;font-weight:700;color:#fff;display:block}
.pvt-lg th.ch .s{font-size:9px;color:var(--text3);display:block;margin-top:1px}
.pvt-lg td.rl{background:var(--bg3);color:var(--text2);font-size:11px;font-weight:500;padding:6px 10px;border:none;border-bottom:1px solid #1b2230;border-right:1px solid var(--border);white-space:nowrap;max-width:165px}
.pvt-lg td.rf{background:var(--bg2);color:var(--text3);font-size:9px;padding:5px 6px;border:none;border-bottom:1px solid #1b2230;white-space:nowrap}
.pvt-lg td.dc{border:none;border-bottom:1px solid #1b2230;text-align:center;padding:5px 8px;white-space:nowrap;vertical-align:middle}
.pvt-lg td.dc.ed{cursor:pointer;transition:filter .1s}
.pvt-lg td.dc.ed:hover{filter:brightness(1.2);outline:1px solid var(--gold3)}
.pvt-lg tr.sep td,.pvt-lg tr.sep th{background:#0e1523;color:#7c8ba3;font-size:9px;font-weight:700;padding:4px 10px;border:none;border-top:1px solid var(--border);border-bottom:1px solid var(--border);letter-spacing:.07em;text-transform:uppercase}
.pvt-lg tr.pvt-lg tr.eng-row td.rl{background:#1d2a3a}
.pvt-lg .cell-d{font-size:12px;font-weight:700;line-height:1.15;display:block}
.pvt-lg .cell-s{font-size:9px;font-weight:400;opacity:.7;display:block;margin-top:1px}
.pvt{border-collapse:collapse;font-size:10px}
.pvt th.lh{background:var(--bg4);color:var(--text2);font-size:10px;font-weight:600;padding:4px 6px;border:none;border-bottom:1px solid var(--border2);border-right:1px solid var(--border);white-space:nowrap;text-align:left;letter-spacing:.04em;text-transform:uppercase}
.pvt th.ch{background:#1b212b;color:var(--text);font-weight:700;padding:4px 6px;border:none;border-bottom:1px solid var(--border2);text-align:center;white-space:nowrap}
.pvt th.ch .t{font-size:11px;font-weight:700;color:#fff;display:block}
.pvt th.ch .s{font-size:9px;color:var(--text3);display:block;margin-top:1px}
.pvt td.rl{background:var(--bg4);color:var(--text2);font-size:9px;font-weight:500;padding:3px 6px;border:none;border-bottom:1px solid #1b2230;border-right:1px solid var(--border);white-space:nowrap;max-width:130px}
.pvt td.rf{background:var(--bg2);color:var(--text3);font-size:9px;padding:5px 6px;border:1px solid var(--border);white-space:nowrap}
.pvt td.dc{border:1px solid var(--border);text-align:center;padding:2px 4px;white-space:nowrap;vertical-align:middle}
.pvt td.dc.ed{cursor:pointer;transition:filter .1s}.pvt td.dc.ed:hover{filter:brightness(1.2);outline:1px solid var(--gold3)}
.pvt tr.sep td,.pvt tr.sep th{background:#111827;color:#8ea0b8;font-size:9px;font-weight:700;padding:2px 6px;border:none;border-top:1px solid var(--border);border-bottom:1px solid var(--border);letter-spacing:.06em;text-transform:uppercase}
.pvt tr.pvt tr.eng-row td.rl{background:#1d2a3a}
.pvt .cell-d{font-size:10px;font-weight:700;line-height:1.1;display:block}
.pvt .cell-s{font-size:7px;font-weight:400;opacity:.7;display:block;margin-top:1px}
.cg{background:rgba(63,185,80,.12);color:#4ade80}
.cy{background:rgba(227,179,65,.12);color:#fbbf24}
.co{background:rgba(249,115,22,.13);color:#fb923c}
.cr{background:rgba(248,81,73,.14);color:#f87171}
.cn{background:transparent;color:var(--text3)}
.cell-d{font-size:12px;font-weight:700;line-height:1.1;display:block}
.cell-s{font-size:9px;font-weight:400;opacity:.7;display:block;margin-top:1px}
table.dt-c{border-collapse:collapse;font-size:12px;width:auto}
table.dt-c thead tr{background:#111827}
table.dt-c th{padding:5px 8px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);letter-spacing:.03em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer}
table.dt-c th:hover{color:var(--text)}
table.dt-c td{padding:6px 8px;border-bottom:1px solid #1b2230;vertical-align:middle;white-space:nowrap;font-size:12px;color:var(--text)}
table.dt-c tbody tr:hover td{background:rgba(255,255,255,.025)}
table.dt-c tr.tif-warn td{background:rgba(201,160,32,.1)!important}
table.dt-c tr:last-child td{border-bottom:none}
table.dt-c td.ed{cursor:pointer}
table.dt-c td.ed:hover{background:rgba(201,168,76,.07)!important;outline:1px solid rgba(201,168,76,.3)}
table.dt-c td.mono{font-family:monospace;font-size:11px;color:#aab8d0}
table.dt-c td.dim{color:#c0cce0;font-size:12px}
table.dt-c td.bld{font-weight:600;font-size:12px;color:#e8edf5}
table.dt-c td.ell{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#c0cce0}
.dc-inline{display:inline-flex;flex-direction:column;align-items:center;padding:3px 6px;border-radius:4px;font-size:11px;cursor:pointer;transition:filter .1s;text-align:center;border:1px solid transparent}
.dc-inline:hover{filter:brightness(1.2);border-color:var(--gold3)}
.dc-inline.cg{background:rgba(46,168,107,.19);color:#5dd899;border-color:rgba(46,168,107,.28)}
.dc-inline.cy{background:rgba(201,160,32,.19);color:#d9b830;border-color:rgba(201,160,32,.28)}
.dc-inline.co{background:rgba(217,120,48,.19);color:#e08840;border-color:rgba(217,120,48,.28)}
.dc-inline.cr{background:rgba(224,85,85,.21);color:#f07070;border-color:rgba(224,85,85,.3)}
.dc-inline.cn{background:rgba(255,255,255,.05);color:var(--text3);border-color:var(--border)}
.b{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.bg{background:rgba(46,168,107,.18);color:#5dd899;border:1px solid rgba(46,168,107,.3)}
.br{background:rgba(224,85,85,.18);color:var(--red);border:1px solid rgba(224,85,85,.32)}
.by{background:rgba(201,160,32,.18);color:var(--yellow);border:1px solid rgba(201,160,32,.32)}
.bo{background:rgba(217,120,48,.18);color:var(--orange);border:1px solid rgba(217,120,48,.32)}
.bb{background:rgba(74,144,217,.14);color:var(--blue);border:1px solid rgba(74,144,217,.28)}
.bgr{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border2)}
.bgold{background:var(--gold2);color:var(--gold);border:1px solid var(--gold3)}
.btn{padding:5px 11px;border-radius:var(--r);border:1px solid var(--border2);font-size:11px;font-weight:500;cursor:pointer;background:var(--bg4);color:var(--text);font-family:var(--font);transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.btn:hover{background:var(--bg5)}
.btn.primary{background:#1f6feb;color:#fff;border-color:#1f6feb;font-weight:600;box-shadow:0 2px 8px rgba(31,111,235,.3)}
.btn.primary:hover{background:rgba(201,168,76,.24)}
.btn.sm{padding:2px 6px;font-size:9px}
.btn.danger{color:var(--red);background:rgba(224,85,85,.14);border-color:rgba(224,85,85,.28)}
.sdiv{font-size:13px;font-weight:800;color:#e8edf5;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tbl-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:10px}
.sc2{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;display:flex;flex-direction:column}
.sc2-top{height:4px;background:rgba(255,255,255,.12)}
.sc2-body{padding:14px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1}
.sc2-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.sc2-val{font-size:20px;font-weight:700;color:var(--text)}
.sc2-val.gold{color:var(--gold)}.sc2-val.r{color:var(--red)}.sc2-val.y{color:var(--yellow)}.sc2-val.g{color:var(--green)}
.stat-strip{display:flex;align-items:stretch;margin-bottom:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 22px;text-align:center;flex:1}
.stat-div{width:1px;background:var(--border2);align-self:stretch;flex-shrink:0}
.stat-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-val{font-size:20px;font-weight:600;color:var(--text);line-height:1}
.page-wrap{margin:0 auto;display:flex;flex-direction:column;align-items:flex-start;max-width:100%}
.page-wrap .tbl-wrap,.page-wrap .tbl-scroll{overflow-x:auto}
.ov-center{display:flex;justify-content:center;width:100%}


.page-center{display:flex;flex-direction:column;align-items:center}
.page-center .ov-block{width:fit-content;max-width:100%}
table.dt-c td.ell-wide{max-width:340px;min-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#c0cce0}
.tbl-scroll{overflow-x:auto}.tbl-scroll::-webkit-scrollbar{height:3px}.tbl-scroll::-webkit-scrollbar-thumb{background:var(--bg5)}
.search-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.search-bar input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:5px 9px;font-size:11px;color:var(--text);font-family:var(--font);outline:none;min-width:220px}
.search-bar input:focus{border-color:var(--gold3)}
.popup{position:fixed;background:#111827;border:1px solid var(--gold3);border-radius:var(--r2);padding:10px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:190px;max-width:300px}
.popup-title{font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.popup input,.popup select,.popup textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:11px;color:var(--text);font-family:var(--font);width:100%;outline:none;margin-bottom:7px}
.popup textarea{resize:vertical;min-height:60px}
.popup input:focus,.popup select:focus,.popup textarea:focus{border-color:var(--gold3)}
.popup select option{background:var(--bg3)}
select option{background:#1a2035;color:#d6ddf0}
select option:hover{background:#c9a84c!important;color:#1a2035!important;cursor:pointer}
select option:focus,select option:active{background:#c9a84c;color:#1a2035}
select:focus option:checked{background:#c9a84c;color:#1a2035}
.popup-btns{display:flex;gap:5px;justify-content:flex-end}
.remark-tooltip{position:fixed;background:#111827;border:1px solid var(--gold3);border-radius:var(--r);padding:8px 10px;font-size:11px;color:var(--text);max-width:220px;z-index:600;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.ov-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.modal{background:#1a2035;border:1px solid var(--border2);border-radius:10px;padding:18px;width:90%;max-width:600px;max-height:88vh;overflow-y:auto}
.modal::-webkit-scrollbar{width:3px}.modal::-webkit-scrollbar-thumb{background:var(--bg5)}
.m-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;padding-bottom:11px;border-bottom:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:8px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:6px 8px;font-size:11px;color:var(--text);font-family:var(--font);outline:none;transition:border .12s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold3)}
.fg select option{background:var(--bg3)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;margin-bottom:8px}
.m-footer{display:flex;gap:7px;justify-content:flex-end;padding-top:11px;border-top:1px solid var(--border);margin-top:5px}
.toast{position:fixed;bottom:16px;right:16px;background:#111827;border:1px solid rgba(46,168,107,.4);color:#5dd899;padding:7px 12px;border-radius:var(--r2);font-size:10px;font-weight:600;z-index:2000;pointer-events:none;animation:fin .18s ease}
@keyframes fin{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.time-total{padding:6px;background:var(--bg2);border-radius:var(--r);font-size:16px;font-weight:700;color:var(--gold);text-align:center;min-height:32px;display:flex;align-items:center;justify-content:center}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:12px}
.chart-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px}
.chart-title{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.chart-box canvas{max-height:180px}

/* Custom time picker */
.timepick{display:flex;gap:0;border:1.5px solid rgba(74,158,255,.5);border-radius:8px;overflow:hidden;background:var(--bg3);cursor:pointer;user-select:none}
.timepick:hover{border-color:var(--gold)}
.timepick-h,.timepick-m{flex:1;display:flex;flex-direction:column;align-items:center}
.timepick-label{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:4px 0;background:rgba(255,255,255,.04);width:100%;text-align:center;border-bottom:1px solid var(--border)}
.timepick-val{font-size:24px;font-weight:700;font-family:monospace;color:var(--gold);padding:10px 8px;width:100%;text-align:center;background:transparent}
.timepick-sep{font-size:24px;font-weight:700;color:var(--gold);display:flex;align-items:center;padding:14px 2px 0;opacity:.6}
.timepick-drop{position:fixed;z-index:2000;background:#1a2035;border:1.5px solid rgba(74,158,255,.5);border-radius:7px;overflow-y:auto;max-height:200px;min-width:70px;box-shadow:0 6px 24px rgba(0,0,0,.8)}
.timepick-drop::-webkit-scrollbar{width:4px}.timepick-drop::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.timepick-opt{padding:7px 12px;font-family:monospace;font-size:14px;color:var(--text2);cursor:pointer;text-align:center}
.timepick-opt:hover,.timepick-opt.active{background:var(--gold);color:#1a2035;font-weight:700}

/* Login overlay */
.login-ov{position:fixed;inset:0;background:var(--bg);z-index:5000;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:30px 34px;width:90%;max-width:360px;text-align:center}
.login-box h1{font-size:26px;font-weight:900;color:#fff;letter-spacing:.02em;margin-bottom:2px;line-height:1}
.login-box .sub{font-size:10px;color:#58a6ff;font-weight:600;letter-spacing:.22em;text-transform:uppercase;margin-bottom:20px}
.login-box input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:7px;padding:11px 12px;font-size:15px;color:var(--text);font-family:var(--font);outline:none;text-align:center;margin-bottom:12px}
.login-box input:focus{border-color:var(--gold)}
.login-box button{width:100%;padding:11px;border-radius:7px;border:none;background:var(--gold2);color:var(--gold);border:1px solid var(--gold3);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.login-box button:hover{background:rgba(201,168,76,.28)}
.login-err{color:var(--red);font-size:11px;margin-bottom:10px;min-height:14px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.log-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:4000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.log-box{background:#1a2035;border:1px solid var(--border2);border-radius:10px;padding:20px;width:92%;max-width:560px;max-height:80vh;display:flex;flex-direction:column}
.log-box h2{font-size:14px;color:var(--gold);margin-bottom:12px}
.log-list{overflow-y:auto;flex:1;margin-bottom:14px}
.log-item{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px}
.log-item .lt{color:var(--text3);font-size:9px;margin-bottom:2px}
.log-item .ld{color:var(--text)}

/* ═══ MOBILE ═══ */
.nav-scroll::-webkit-scrollbar{display:none}
.nav-scroll{scrollbar-width:none;-webkit-overflow-scrolling:touch}
@media(max-width:820px){
  .nav{flex-wrap:wrap;padding:8px 10px;gap:6px;min-height:0}
  .brand{border-right:none;padding:0;flex:1;min-width:0}
  .brand img{height:34px!important}
  .brand-t{font-size:17px}
  .brand-s{font-size:8px}
  .nav-btns{border-left:none;padding:0;margin-left:auto}
  .nav-btns .nbtn{padding:5px 8px;font-size:10px}
  .nav-scroll{order:10;flex-basis:100%;width:100%;overflow-x:auto;padding-bottom:2px;border-top:1px solid var(--border);margin-top:4px}
  .tab{padding:8px 11px;font-size:12.5px}
  .content{padding:10px 8px}
  .ov-block{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl-wrap{max-width:100%}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stat-strip{flex-wrap:wrap;row-gap:10px}
  .stat-item{flex:1 1 30%;padding:0 8px}
  .stat-div:nth-of-type(6){display:none}
  .page-wrap{max-width:100vw}
  .ph-title{font-size:19px}
}

@media(max-width:820px){
  .ov-center{justify-content:flex-start}
  .page-wrap{width:100%;align-items:stretch}
  .ov-grid{justify-content:flex-start;flex-wrap:nowrap;flex-direction:column;overflow-x:visible}
  .ov-grid>*{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ov-block table{min-width:max-content}
  .tbl-wrap{width:100%!important;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl-wrap table{min-width:max-content}
  #bxl,#bbk,#brs{display:none}
}

@media(max-width:820px){
  /* Freeze header row + first column inside scrollable tables (Google-Sheets style) */
  .pvt-lg thead th,.pvt thead th,.dt-c thead th,.ov-block table thead th{position:sticky;top:0;z-index:3}
  .pvt-lg tr>*:first-child,.pvt tr>*:first-child,.dt-c tr>*:first-child,.ov-block table tr>*:first-child{position:sticky;left:0;z-index:2}
  .pvt-lg thead th:first-child,.pvt thead th:first-child,.dt-c thead th:first-child,.ov-block table thead th:first-child{z-index:4}
  .pvt-lg tr>td:first-child,.pvt tr>td:first-child{background:var(--bg4)}
  .pvt-lg tr.sep>td,.pvt tr.sep>td,.ov-block table tr>td[colspan]{position:static!important}
  .seplbl{position:sticky;left:10px;display:inline-block}
  .dt-c tr>td:first-child{background:var(--bg3)}
  .ov-block table tr>td:first-child{background:var(--bg4)}
  .tbl-scroll{max-height:75vh;overflow:auto}
  /* App feel */
  .ed{-webkit-tap-highlight-color:transparent}
  .ed:active{background:rgba(56,139,253,.18)!important;transition:background .05s}
  .ov-block,.tbl-wrap{border-radius:10px}
  .ov-stats{display:none}
  .content{padding-bottom:calc(130px + env(safe-area-inset-bottom))}
}

/* ═══ SIDEBAR SHELL ═══ */
.shell{display:flex;min-height:100vh}
.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:9px;padding:16px 14px 14px}
.sb-brand img{height:30px;width:auto;filter:drop-shadow(0 0 6px rgba(56,139,253,.45))}
.sb-brand-t{font-size:15px;font-weight:900;color:#e6edf3;letter-spacing:-.02em;line-height:1}
.sb-brand-s{font-size:7.5px;color:#58a6ff;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-top:2px}
.sb-h{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:12px 16px 5px}
.sb-i{display:flex;align-items:center;gap:10px;margin:1px 8px;padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:500;color:#8b9cb3;cursor:pointer;transition:all .12s}
.sb-i:hover{background:rgba(255,255,255,.04);color:#e6edf3}
.sb-i.on{background:#1f6feb;color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(31,111,235,.35)}
.sb-i .ic{width:17px;height:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-i .ic svg{width:16px;height:16px}
.sb-foot{margin-top:auto;border-top:1px solid var(--border);padding:12px 14px}
.sb-user{font-size:11.5px;font-weight:600;color:var(--text);margin-bottom:2px}
.sb-role{font-size:9.5px;font-weight:600}
.sb-actions{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.sb-actions .nbtn{padding:4px 8px;font-size:9.5px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
@media(max-width:820px){
  .sidebar{display:none}
}
@media(min-width:821px){
  .nav{display:none}
}

/* ═══ OVERVIEW BALANCED LAYOUT ═══ */
.ov-layout{display:grid;grid-template-columns:minmax(0,auto) minmax(300px,1fr) minmax(300px,1fr);gap:12px;align-items:start;margin-bottom:12px}
.ov-zone{display:flex;flex-direction:column;gap:12px;min-width:0}
.ov-zone .ov-block{width:100%;max-width:100%;overflow-x:auto}
.ov-zone .ov-block table{width:100%}
@media(max-width:1500px){.ov-layout{grid-template-columns:minmax(0,auto) minmax(280px,1fr)}.ov-zone:nth-child(3){grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;align-items:start}}
@media(max-width:820px){.ov-layout{grid-template-columns:1fr}.ov-zone:nth-child(3){display:flex;flex-direction:column}}

/* hover */
.pvt-lg tbody tr:not(.sep):hover td.rl{color:#e6edf3}
.pvt-lg tbody tr:not(.sep):hover td.dc.cn{background:rgba(255,255,255,.035)}
.pvt tbody tr:not(.sep):hover td.rl{color:#e6edf3}
.dt-c tbody tr:hover td{background:rgba(255,255,255,.028)}
/* mini progress bar */
.mbar{display:block;height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:3px;overflow:hidden;min-width:52px}

.chart-grid{grid-template-columns:1fr 1fr}

.ph-crumb{font-size:11px;color:var(--text3);margin-bottom:6px}
.ph-crumb b{color:var(--text2);font-weight:500}

.bottomnav{display:none}
.more-sheet{display:none}

  .bn-i.on{color:#58a6ff}
  .nav-scroll{display:none!important}
  .content{padding-bottom:calc(160px + env(safe-area-inset-bottom))!important}

  @keyframes sheetUp{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .more-grab{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:2px auto 10px}
  .more-h{font-size:9.5px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:10px 2px 5px}
  .more-i{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:10px;font-size:13.5px;font-weight:500;color:#c3cede}
  .more-i svg{width:18px;height:18px;flex-shrink:0}
  .more-i.on{background:#1f6feb;color:#fff}
  .ph-crumb{display:none}
  .fleet-sum{display:block!important}
}
.fleet-sum{display:none}
.fh-table{width:100%;border-collapse:collapse}

let USER=null;            // {name, role, pwd}
let CHANGES=[];           // pending change descriptions
let CHANGED_KEYS=new Set(); // which data lists changed (for fast partial save)
let SRV_VERSION=0;        // last known server version
let SYNC_STATE='off';     // off|ok|saving|error
let pushTimer=null;
const CLOUD_ON=()=>API_URL&&!API_URL.startsWith('PASTE');
const NEED_SCRIPT_V=3;
function checkScriptVersion(resp){
  if(!resp)return;
  const cur=+resp.sv||0;
  let b=document.getElementById('svwarn');
  if(cur<NEED_SCRIPT_V){
    if(!b){
      b=document.createElement('div');b.id='svwarn';
      b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:6000;background:#5a1e1e;color:#ffb4b4;font-size:12px;font-weight:600;padding:8px 12px;text-align:center;border-bottom:1px solid #a33';
      b.textContent='⚠ Google Script is OUTDATED (v'+cur+', need v'+NEED_SCRIPT_V+') — paste the new Code.gs, then Deploy → Manage deployments → ✏ Edit → Version: New version → Deploy. Sync will stay slow until then.';
      document.body.appendChild(b);
    }
  }else if(b)b.remove();
}

const LIST_NAMES={uavs:'UAV',engines:'Engine',gcs:'GCS',gdt:'GDT',satcoms:'Satcom',payloads:'Payload',eparts:'Engine Part',flt:'FLT',gse_gens:'Generator',opats:'OPATS',gse_tools:'Tool',tifs:'TIF',sbs:'SB',rmas:'RMA',rrqs:'RRQ',flights:'Flight',faults:'Fault'};
const LBL_FIELD={uavs:'tail',engines:'num',gcs:'unit',gdt:'unit',satcoms:'name',payloads:'sn',eparts:'sn',flt:'item',gse_gens:'item',opats:'sn',gse_tools:'item',tifs:'num',sbs:'num',rmas:'form',rrqs:'form',flights:'date',faults:'date'};
const OP_BLOCKED_EK=['sn','num','item','unit','name','tail'];

function unitLabel(lk,unit){const f=LBL_FIELD[lk];return (unit&&f&&unit[f])?unit[f]:('#'+(unit?unit.id:'?'));}
const EK_LABELS={monthly:'Monthly inspection',q3:'3-Month inspection',q6:'6-Month inspection',qtr:'Quarterly inspection',annual:'Annual inspection',pitot3y:'Pitot/Fuel & Air Tube 3Y',cor5y:'Corrosion 5Y',ff200:'Fuel Filters 200H threshold',fpr8y:'Fuel Pressure Regulator 8Y',vt8y:'V-Tail 10Y',vt4k:'V-Tail 6000H threshold',mlgr:'R-MLG 10Y',mlgl:'L-MLG 10Y',bat3y:'UPS Battery 3Y',bat2y:'Battery 2Y',cbat5y:'Comp Battery 5Y',sixMonthly:'6-Month check',coolant2y:'Coolant 2Y',prop700:'Propeller 700H threshold',prop4y:'Propeller 4Y',rub5y:'Rubber Parts 5Y',pres:'Preservation 1Y',calib:'Annual calibration',oh25done:'25H OH (one-time)',oh50:'50H OH threshold',oh100:'100H OH threshold',oh200:'200H OH threshold',oh300:'300H OH threshold',oh900:'900H OH threshold',svc:'Serviceable',remarks:'Remarks',hrs:'Engine hours',fh:'Flight hours',loc:'Location',site:'Location',uav:'Assigned UAV',status:'Status',date:'Date',reply:'Reply date',shipped:'Shipped',invoice:'Invoice',arrived:'Arrived',t3y:'3Y Treatment',sn:'S/N',num:'Number',item:'Item name',engOH:'Engine OH @ assembly',itemOH:'Item OH',dateAcc:'Date accepted',snSent:'S/N sent',snRcvd:'S/N received',qtyRcvd:'Qty received',desc:'Description',note:'Note',tif:'TIF #',urgent:'Urgent'};
function prettyVal(v){
  if(v===true)return'YES';
  if(v===false)return'NO';
  if(v===''||v===null||v===undefined)return'(cleared)';
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(v)))return fmtD(v);
  return String(v);
}
function logChange(lk,unit,ek,oldV,newV){
  const fld=EK_LABELS[ek]||ek;
  const desc=`${LIST_NAMES[lk]||lk} ${unitLabel(lk,unit)} — ${fld}: ${prettyVal(newV)}`;
  CHANGES.push({ts:Date.now(),desc});
  CHANGED_KEYS.add(lk);
  schedulePush();
}
function logAction(desc,lk){CHANGES.push({ts:Date.now(),desc});CHANGED_KEYS.add(lk||'__all__');schedulePush();}
function schedulePush(){
  if(!CLOUD_ON()||!USER)return;
  SYNC_STATE='saving';updSyncDot();
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushSave,1200);
}
async function api(body){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return r.json();
}
async function pushSave(){
  if(!CLOUD_ON()||!USER)return;
  try{
    const lists=CHANGED_KEYS.has('__all__')?null:Array.from(CHANGED_KEYS);
    const t0=Date.now();
    const resp=await api({action:'save',pwd:USER.pwd,name:USER.name,data:S.data,changes:CHANGES,lists});
    const dur=((Date.now()-t0)/1000).toFixed(1);
    console.log('[sync] save took '+dur+'s, lists:',lists);
    if(+dur>10)toast('⚠ Save took '+dur+'s — Apps Script probably outdated');
    if(resp.ok){SRV_VERSION=resp.version;CHANGES=[];CHANGED_KEYS.clear();SYNC_STATE='ok';}
    else{SYNC_STATE='error';toast('⚠ Sync failed: '+(resp.err||''));}
  }catch(e){SYNC_STATE='error';toast('⚠ Offline - will retry');setTimeout(pushSave,8000);}
  updSyncDot();
}
async function pullData(){
  const resp=await api({action:'load'});
  checkScriptVersion(resp);
  if(resp.ok){
    if(resp.data){S.data=resp.data;sv(S.data);}
    SRV_VERSION=resp.version||0;
    return resp;
  }
  return null;
}
let _lastPoll=0;
async function pollOnce(){
  if(!CLOUD_ON()||!USER)return;
  if(Date.now()-_lastPoll<2000)return;
  _lastPoll=Date.now();
  try{
    if(!AP&&!S.modal&&CHANGES.length===0){
      const resp=await api({action:'poll'});
      checkScriptVersion(resp);
      if(resp.ok&&resp.version>SRV_VERSION){
        const l=await pullData();
        if(l){
          render();
          if(USER.role==='ADMIN')showNewActivity(l.log);
        }
      }
    }
  }catch(e){}
}
async function pollLoop(){
  await pollOnce();
  setTimeout(pollLoop,5000);
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)pollOnce();});
window.addEventListener('focus',()=>pollOnce());
function updSyncDot(){
  const bg=SYNC_STATE==='ok'?'var(--green)':SYNC_STATE==='saving'?'var(--yellow)':SYNC_STATE==='error'?'var(--red)':'var(--text3)';
  const txt=SYNC_STATE==='ok'?'Live':SYNC_STATE==='saving'?'Saving…':SYNC_STATE==='error'?'Offline':'Local';
  document.querySelectorAll('.syncdot').forEach(el=>el.style.background=bg);
  document.querySelectorAll('.synclbl').forEach(el=>el.textContent=txt);
}
function canEdit(ek,lk){
  if(!CLOUD_ON())return true;
  if(!USER)return false;
  if(USER.role==='VIEWER')return false;
  if(USER.role==='OPERATOR'&&lk==='eparts')return true;
  if(USER.role==='OPERATOR'&&OP_BLOCKED_EK.includes(ek))return false;
  return true;
}
function canAdmin(){return !CLOUD_ON()||(USER&&USER.role==='ADMIN');}

function showLogin(){
  const ov=document.createElement('div');ov.className='login-ov';ov.id='loginov';
  ov.innerHTML=`<div class="login-box">
    <img src="${LOGO}" style="height:58px;width:auto;filter:drop-shadow(0 0 10px rgba(56,139,253,.5));margin-bottom:10px" alt="H900">
    <h1>OSPREY</h1><div class="sub">Maintenance Manager</div>
    <div style="display:flex;gap:6px;margin-bottom:14px" id="lroles">
      ${['ADMIN','OPERATOR','VIEWER'].map((r,i)=>`<button type="button" class="lrole" data-r="${r}" style="flex:1;padding:9px 4px;border-radius:7px;border:1.5px solid ${i===0?'var(--gold)':'var(--border2)'};background:${i===0?'var(--gold2)':'var(--bg3)'};color:${i===0?'var(--gold)':'var(--text2)'};font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)">${r}</button>`).join('')}
    </div>
    <div class="login-err" id="lerr"></div>
    <input type="password" id="lpwd" placeholder="Enter code" autocomplete="off" inputmode="numeric">
    <button id="lbtn">Login</button>
    <div style="margin-top:18px;font-size:8.5px;color:var(--text3);letter-spacing:.04em">© 2026 Tomer Sudman. All rights reserved.</div>
  </div>`;
  document.body.appendChild(ov);
  let selRole='ADMIN';
  ov.querySelectorAll('.lrole').forEach(b=>b.addEventListener('click',()=>{
    selRole=b.dataset.r;
    ov.querySelectorAll('.lrole').forEach(x=>{
      const on=x.dataset.r===selRole;
      x.style.border='1.5px solid '+(on?'var(--gold)':'var(--border2)');
      x.style.background=on?'var(--gold2)':'var(--bg3)';
      x.style.color=on?'var(--gold)':'var(--text2)';
    });
    document.getElementById('lpwd').focus();
  }));
  const go=async()=>{
    const pwd=document.getElementById('lpwd').value.trim();
    if(!pwd)return;
    document.getElementById('lbtn').textContent='Checking…';
    try{
      const resp=await api({action:'login',pwd});
      if(resp.ok&&resp.role!==selRole){
        document.getElementById('lerr').textContent='Wrong code for '+selRole;
        document.getElementById('lbtn').textContent='Login';
        return;
      }
      if(resp.ok){
        let saved=null;try{saved=JSON.parse(localStorage.getItem('uas_user'))}catch(e){}
        let name=saved&&saved.name?saved.name:'';
        if(!name){
          name=prompt('Welcome! Please enter your full name:')||'';
          name=name.trim();
          if(!name){document.getElementById('lerr').textContent='Name is required';document.getElementById('lbtn').textContent='Login';return;}
        }
        USER={name,role:resp.role,pwd};
        localStorage.setItem('uas_user',JSON.stringify(USER));
        ov.remove();
        await afterLogin();
      }else{
        document.getElementById('lerr').textContent='Wrong password';
        document.getElementById('lbtn').textContent='Login';
      }
    }catch(e){
      document.getElementById('lerr').textContent='Cannot reach server - check connection';
      document.getElementById('lbtn').textContent='Login';
    }
  };
  document.getElementById('lbtn').onclick=go;
  document.getElementById('lpwd').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  document.getElementById('lpwd').focus();
}
async function afterLogin(){
  SYNC_STATE='saving';
  const l=await pullData();
  if(l&&!l.data&&USER.role==='ADMIN'){await pushSave();}
  SYNC_STATE='ok';
  render();
  updSyncDot();
  pollLoop();
  if(USER.role==='ADMIN')showNewActivity(l?l.log:[]);
}
function showNewActivity(log){
  if(document.querySelector('.log-ov'))return;
  const last=+localStorage.getItem('uas_lastlog')||0;
  const fresh=(log||[]).filter(e=>e.ts>last&&(e.name!==USER.name||e.role!==USER.role));
  if(!fresh.length)return;
  const ov=document.createElement('div');ov.className='log-ov';
  const roleClr=r=>r==='ADMIN'?'#388bfd':r==='OPERATOR'?'var(--green)':'var(--text3)';
  const tfmt=ts=>{const d=new Date(ts);const today=new Date();const same=d.toDateString()===today.toDateString();
    return (same?'Today':d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}))+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});};
  ov.innerHTML=`<div class="log-box">
    <h2>🔔 New Activity <span style="font-size:11px;color:var(--text3);font-weight:400">(${fresh.length} update${fresh.length>1?'s':''})</span></h2>
    <div class="log-list">${fresh.map(e=>`
      <div class="log-item" style="display:flex;gap:10px;align-items:flex-start;padding:10px 8px">
        <span style="width:8px;height:8px;border-radius:50%;background:${roleClr(e.role)};margin-top:5px;flex-shrink:0"></span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:var(--text);line-height:1.45">${e.desc}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:3px"><b style="color:${roleClr(e.role)}">${e.name}</b> · ${e.role.charAt(0)+e.role.slice(1).toLowerCase()} · ${tfmt(e.ts)}</div>
        </div>
      </div>`).join('')}</div>
    <button class="btn primary" id="lgok" style="justify-content:center">OK, Got it</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('lgok').onclick=()=>{
    localStorage.setItem('uas_lastlog',String(Math.max(...fresh.map(e=>e.ts))));
    ov.remove();
  };
}
function logout(){
  localStorage.removeItem('uas_user');
  location.reload();
}
function boot(){
  render();
  if(!CLOUD_ON()){SYNC_STATE='off';updSyncDot();return;}
  let saved=null;try{saved=JSON.parse(localStorage.getItem('uas_user'))}catch(e){}
  if(saved&&saved.pwd){
    api({action:'login',pwd:saved.pwd}).then(resp=>{
      if(resp.ok){USER={name:saved.name,role:resp.role,pwd:saved.pwd};afterLogin();}
      else showLogin();
    }).catch(()=>showLogin());
  }else showLogin();
}

const INT={weekly:7,monthly:30,'3m':91,'6m':182,'1y':365,'2y':730,'3y':1095,'4y':1460,'5y':1825,'8y':2920,'10y':3650};

/* ═══ HELPERS ═══ */
const INT_MONTHS={monthly:1,'3m':3,'6m':6,'1y':12,'2y':24,'3y':36,'4y':48,'5y':60,'8y':96,'10y':120};
function addInt(s,f){
  if(!s)return null;
  const parts=String(s).slice(0,10).split('-').map(Number);
  if(parts.length!==3||parts.some(isNaN))return null;
  if(f==='weekly'){const d=new Date(Date.UTC(parts[0],parts[1]-1,parts[2]+7));return d.toISOString().slice(0,10);}
  const mo=INT_MONTHS[f];if(!mo)return null;
  const d=new Date(Date.UTC(parts[0],parts[1]-1+mo,parts[2]));
  return d.toISOString().slice(0,10);
}
function du(s){if(!s)return null;const d=new Date(s);if(isNaN(d))return null;return Math.round((d-TODAY)/MS)}
function fmtD(s){if(!s)return'—';const d=new Date(s);if(isNaN(d))return s;const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return String(d.getDate()).padStart(2,'0')+'-'+mo[d.getMonth()]+'-'+String(d.getFullYear()).slice(2)}
function toI(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return'';return d.toISOString().slice(0,10)}
function fdays(d){if(d===null)return'';if(d<0)return Math.abs(d)+'d OVR';if(d===0)return'TODAY';return d+'d'}
/* Hours HH:MM format */
function fmtHHMM(h){if(h===''||h===null||isNaN(+h))return'—';const total=Math.abs(+h);const hh=Math.floor(total);const mm=Math.round((total-hh)*60);return(+h<0?'-':'')+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')}
function parseHHMM(s){if(!s)return null;if(s.includes(':')){ const[h,m]=s.split(':').map(Number);return h+(m||0)/60;}return +s||null}
function uavHL(thresh,fh){if(!thresh||isNaN(+thresh))return null;return(+thresh)-(+fh||0)}
function engHL(thresh,hrs){if(!thresh||isNaN(+thresh))return null;return(+thresh)-(+hrs||0)}

function cDate(days,freq){if(days===null)return'cn';if(days<0)return'cr';const t=INT[freq]||30;if(days<=7)return'cr';if(days<=t*0.15)return'co';if(days<=t*0.35)return'cy';return'cg'}
function cHour(rem,intv){if(rem===null||isNaN(+rem))return'cn';if(+rem<=0)return'cr';if(+rem<=intv*0.1)return'cr';if(+rem<=intv*0.2)return'co';if(+rem<=intv*0.35)return'cy';return'cg'}
function svcCl(s){return s==='YES'?'cg':s==='NO'?'cr':s==='PARTIALLY'?'cy':'cn'}
function svcBadge(s){return`<span class="b ${s==='YES'?'bg':s==='PARTIALLY'?'by':'br'}">${s||'?'}</span>`}
function badge(t,c){return`<span class="b ${c}">${t}</span>`}
function sts2c(s){return s==='Open'?'br':s==='Closed'?'bg':(s==='Answered'||s==='AI')?'by':'bgr'}
function nid(a){return a.length?Math.max(...a.map(r=>r.id))+1:1}
function toast(msg,type='g'){const t=document.createElement('div');t.className='toast';t.style.borderColor=type==='r'?'rgba(224,85,85,.4)':'rgba(46,168,107,.4)';t.style.color=type==='r'?'#f07070':'#5dd899';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}

  pop.innerHTML=`<div class="popup-title">${label}</div>${ih}<div class="popup-btns"><button class="btn sm" id="pc">✕</button><button class="btn sm primary" id="ps">Save</button></div>`;
  document.body.appendChild(pop);AP=pop;
  const rect=el.getBoundingClientRect();
  let top=rect.bottom+3,left=rect.left;
  if(top+160>window.innerHeight)top=rect.top-170;
  if(left+310>window.innerWidth)left=window.innerWidth-315;
  pop.style.top=Math.max(4,top)+'px';pop.style.left=Math.max(4,left)+'px';
  const pi=document.getElementById('pi');
  if(pi){pi.focus();try{pi.select();}catch(e){}}
  function doSave(){
    let v=document.getElementById('pi').value;
    if(type==='hhmm'){const p=parseHHMM(v);v=p!==null?p:0;}
    else if(type==='number')v=v===''?'':+v;
    const oldV=unit[ek];
    unit[ek]=v;
    if(lk==='engines'&&ek==='num'&&oldV&&oldV!==v){
      S.data.eparts.forEach(p=>{if(p.engSt===oldV)p.engSt=v;});
      CHANGED_KEYS.add('eparts');
    }
    logChange(lk,unit,ek,oldV,v);
    sv(S.data);closePopup();render();toast('Saved!');
  }
  const pc=document.getElementById('pc');const ps=document.getElementById('ps');
  if(pc)pc.onclick=closePopup;if(ps)ps.onclick=doSave;
  if(pi)pi.addEventListener('keydown',e=>{if(e.key==='Enter')doSave();if(e.key==='Escape')closePopup();});
  setTimeout(()=>document.addEventListener('click',outerClick),0);
}

  /* ── OPATS overview ── */
  const opatsTbl=`<div class="ov-block"><div class="ov-block-hdr">🔭 OPATS (${d.opats.length})</div>

  /* ── Open TIFs ── */
  const openTIFs=d.tifs.filter(t=>t.status==='Open');
  const tifOvTbl=openTIFs.length===0
    ?`<div class="ov-block"><div class="ov-block-hdr">📋 Open TIFs</div><div style="padding:10px 12px;font-size:11px;color:var(--green)">✓ No open TIFs</div></div>`

  /* ── Open SBs ── */

  const sbOvTbl=openSBs.length===0
    ?`<div class="ov-block"><div class="ov-block-hdr">⚠ Open Service Bulletins</div><div style="padding:10px 12px;font-size:11px;color:var(--green)">✓ No open SBs</div></div>`

    <table style="${gcsTblCss}"><thead><tr>

  /* ── Overdue RMAs >60 days not received ── */
  const overRMAs=d.rmas.filter(r=>{
    if(r.arrived===true)return false;
    if(r.status==='Closed')return false;
    if(!r.date)return false;
    return Math.floor((TODAY-new Date(r.date))/MS)>60;
  });
  const rmaOvTbl=overRMAs.length===0
    ?`<div class="ov-block"><div class="ov-block-hdr">🔴 RMA — Not Rcvd &gt;60d</div><div style="padding:10px 12px;font-size:11px;color:var(--green)">✓ No overdue RMAs</div></div>`
    :`<div class="ov-block"><div class="ov-block-hdr">🔴 RMA — Not Rcvd &gt;60d (${overRMAs.length})</div>
    <table style="${gcsTblCss}"><thead><tr>

      <td style="${rl}">${r.item||'—'}</td>${dimTd(r.tail||'—')}${dimTd(fmtD(r.date))}
      <td class="dc cr" style="font-size:11px;padding:3px 6px"><span class="cell-d">${days}d</span></td>
    </tr>`;}).join('')}
    </tbody></table></div>`;


  const fleetSum=(()=>{
    const clMap={cg:'#4ade80',cy:'#fbbf24',co:'#fb923c',cr:'#f87171',cn:'var(--text3)'};
    const rows=d.uavs.map(u=>{
      const checks=[['Monthly','monthly','monthly'],['3-Month','q3','3m'],['6-Month','q6','6m'],['Corrosion 5Y','cor5y','5y'],['Pitot 3Y','pitot3y','3y']];
      let best=null;
      checks.forEach(c=>{if(!u[c[1]])return;const due=addInt(u[c[1]],c[2]);const dd=du(due);if(best===null||dd<best.d)best={lbl:c[0],d:dd,cl:cDate(dd,c[2])};});
      const svcC=u.svc==='YES'?['#4ade80','rgba(63,185,80,.14)']:u.svc==='NO'?['#f87171','rgba(248,81,73,.15)']:['#fbbf24','rgba(227,179,65,.14)'];

    </div>`;
  return`
  ${fleetSum}
  <div class="ph"><div><div class="ph-title">Fleet readiness</div>
  <div class="ph-sub">Updated ${TODAY.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div></div>

      <div class="ov-charts-row">${fhChartBlock}${faultChartBlock}</div>
    </div>
  </div>
`;
}

function pgUAV(){
  const d=S.data;
  const uavs=d.uavs;
  const rows=[
    {lbl:'Serviceable',type:'svc'},
    {lbl:'Remarks',type:'remarks'},
    {lbl:'Location',type:'site'},
    {lbl:'Total FH (HH:MM)',type:'fh'},
    {lbl:'Engine #',type:'eng'},
    {sep:'PERIODIC CHECKS'},
    {lbl:'Monthly',freq:'monthly',type:'date',key:'monthly'},
    {lbl:'3-Month',freq:'3m',type:'date',key:'q3'},
    {lbl:'6-Month',freq:'6m',type:'date',key:'q6'},
    {lbl:'Corrosion 5Y',freq:'5y',type:'date',key:'cor5y'},
    {sep:'REPLACEMENTS'},
    {lbl:'Fuel Filters 200H',freq:'200H',type:'huav',key:'ff200',intv:200},
    {lbl:'Pitot / Fuel & Air Tube 3Y',freq:'3y',type:'date',key:'pitot3y'},
    {lbl:'Fuel Pressure Regulator 8Y',freq:'8y',type:'date',key:'fpr8y'},
    {lbl:'V-Tail 10Y',freq:'10y',type:'date',key:'vt8y'},
    {lbl:'V-Tail 6000H',freq:'6000H',type:'huav',key:'vt4k',intv:6000},
    {lbl:'Remove R-MLG 10Y',freq:'10y',type:'date',key:'mlgr'},
    {lbl:'Remove L-MLG 10Y',freq:'10y',type:'date',key:'mlgl'},
  ];
  function cell(u,row){
    if(row.type==='svc')return`<td class="dc ${svcCl(u.svc)} ed" data-ek="svc" data-id="${u.id}" data-list="uavs" data-type="select_svc"><span class="cell-d">${u.svc}</span></td>`;
    if(row.type==='remarks'){
      const preview=u.remarks?u.remarks.slice(0,15)+(u.remarks.length>15?'…':''):'—';
      return`<td class="dc cn ed" data-ek="remarks" data-id="${u.id}" data-list="uavs" data-type="textarea"><span class="cell-d" style="font-size:9px">${preview}</span></td>`;
    }
    if(row.type==='site')return`<td class="dc cn ed" data-ek="site" data-id="${u.id}" data-list="uavs" data-type="select_uav_site"><span class="cell-d" style="font-size:9px">${u.site}</span></td>`;
    if(row.type==='fh')return`<td class="dc cn ed" data-ek="fh" data-id="${u.id}" data-list="uavs" data-type="hhmm"><span class="cell-d">${fmtHHMM(+u.fh)||'00:00'}</span></td>`;
    if(row.type==='eng'){const _e=d.engines.find(e=>e.uav===u.tail);return`<td class="dc cn"><span class="cell-d" style="font-size:11px;color:#b8cade">${_e?_e.num:'—'}</span></td>`;}
    if(row.type==='date')return dateTd(u[row.key],row.freq,row.key,u.id,'uavs',true);
    if(row.type==='huav')return hourTdUAV(u[row.key],u.fh,row.key,u.id,'uavs',true);
    return`<td class="dc cn">—</td>`;
  }
  let tbl=`<div class="ov-block" style="overflow-x:auto"><div class="ov-block-hdr">✈ UAV Maintenance — click any cell to edit</div>
  <table class="pvt-lg"><thead><tr><th class="lh" style="min-width:110px">S/N</th>
  ${uavs.map(u=>`<th class="ch"><span class="t">${u.tail}</span><span class="s">${u.site}</span></th>`).join('')}
  </tr></thead><tbody>`;
  rows.forEach(r=>{if(r.sep){tbl+=`<tr class="sep"><td colspan="${1+uavs.length}"><span class="seplbl">${r.sep}</span></td></tr>`;return;}
    tbl+=`<tr><td class="rl">${r.short?`<span class="lbl-full">${r.lbl}</span><span class="lbl-short">${r.short}</span>`:r.lbl}</td>${uavs.map(u=>cell(u,r)).join('')}</tr>`;
  });
  tbl+=`</tbody></table></div>`;
  return`<div class="ov-center"><div class="page-wrap"><div class="ph"><div><div class="ph-title">900 UAV</div><div class="ph-sub">Click any cell to edit • HH:MM format for hours • dates = last done → auto-calculates due</div></div></div>
  <div class="ov-grid">${tbl}</div></div></div>`;
}
function pgGCS(){
  const d=S.data;
  function mkPvt(list,lk,rows,title,colHdr){
    let t=`<div class="ov-block"><div class="ov-block-hdr">${title}</div>
    <table class="pvt-lg"><thead><tr><th class="lh">S/N</th>
    ${list.map(u=>`<th class="ch"><span class="t">${colHdr(u)}</span>${lk==='satcoms'?'':`<span class="s">${u.site||''}</span>`}</th>`).join('')}
    </tr></thead><tbody>`;
    rows.forEach(row=>{
      if(row.sep){t+=`<tr class="sep"><td colspan="${1+list.length}"><span class="seplbl">${row.sep}</span></td></tr>`;return;}
      if(row.type==='svc'){

function pgEng(){
  const d=S.data;
  const checks=[
    {lbl:'UAV',type:'uav'},{lbl:'Location',type:'loc'},{lbl:'Serviceable',type:'svc'},
    {lbl:'Remarks',type:'remarks'},{lbl:'Engine Hours',type:'fh'},
    {sep:'OH INTERVALS (next threshold)'},
    {lbl:'25H OH (one-time)',type:'once',key:'oh25done'},
    {lbl:'Next 50H OH',type:'oh',key:'oh50',intv:50},{lbl:'Next 100H OH',type:'oh',key:'oh100',intv:100},
    {lbl:'Next 200H OH',type:'oh',key:'oh200',intv:200},{lbl:'Next 300H OH',type:'oh',key:'oh300',intv:300},
    {lbl:'Next 900H OH',type:'oh',key:'oh900',intv:900},
    {sep:'COMPONENTS (from Engine Parts)'},
    {lbl:'Carburetor 1/3',type:'comp',ctype:'Carburetor 1/3'},
    {lbl:'Carburetor 2/4',type:'comp',ctype:'Carburetor 2/4'},
    {lbl:'EGT Harness',type:'comp',ctype:'EGT Harness'},
    {lbl:'Alternator Plate',type:'comp',ctype:'Alternator Plate'},
    {lbl:'Propeller 700H',type:'comp',ctype:'Propeller'},
    {sep:'REPLACEMENTS'},
    {lbl:'Coolant 2Y',freq:'2y',type:'date',key:'coolant2y'},
    {lbl:'Propeller Repl. 4Y',freq:'4y',type:'date',key:'prop4y'},
    {lbl:'Rubber Parts 5Y',freq:'5y',type:'date',key:'rub5y'},
    {lbl:'Preservation 1Y',freq:'1y',type:'date',key:'pres'},
  ];
  function getComp(e,ctype){return d.eparts.find(p=>(p.type===ctype||(ctype==='Alternator Plate'&&p.type==='Alternator'))&&p.engSt===e.num)}
  function eCell(e,row){
    if(row.type==='uav')return`<td class="dc cn ed" data-ek="uav" data-id="${e.id}" data-list="engines" data-type="select_uav"><span class="cell-d" style="font-size:12px">${e.uav||'STORAGE'}</span></td>`;
    if(row.type==='loc')return`<td class="dc cn ed" data-ek="loc" data-id="${e.id}" data-list="engines" data-type="select_eng_loc"><span class="cell-d" style="font-size:12px">${e.loc||'—'}</span></td>`;
    if(row.type==='svc')return`<td class="dc ${svcCl(e.svc)} ed" data-ek="svc" data-id="${e.id}" data-list="engines" data-type="select_svc"><span class="cell-d">${e.svc}</span></td>`;
    if(row.type==='remarks'){const preview=e.remarks?e.remarks.slice(0,12)+'…':'—';return`<td class="dc cn ed" data-ek="remarks" data-id="${e.id}" data-list="engines" data-type="textarea"><span class="cell-d" style="font-size:9px">${preview}</span></td>`;}
    if(row.type==='fh')return`<td class="dc cn ed" data-ek="hrs" data-id="${e.id}" data-list="engines" data-type="hhmm"><span class="cell-d">${fmtHHMM(+e.hrs)||'00:00'}</span></td>`;
    if(row.type==='once'){
      if(e[row.key])return`<td class="dc cg ed" data-ek="${row.key}" data-id="${e.id}" data-list="engines" data-type="checkbox_bool"><span class="cell-d">✔ Done</span></td>`;
      const rem25=25-(+e.hrs||0);
      return`<td class="dc ${rem25<=0?'cr':rem25<=5?'co':'cy'} ed" data-ek="${row.key}" data-id="${e.id}" data-list="engines" data-type="checkbox_bool"><span class="cell-d">${fmtHHMM(rem25)}</span><span class="cell-s">to 25H insp.</span></td>`;
    }
    if(row.type==='oh')return hourTdEng(e[row.key],e.hrs,row.key,e.id,'engines',true,row.intv);
    if(row.type==='date')return dateTd(e[row.key],row.freq,row.key,e.id,'engines',true);
    if(row.type==='comp'){
      const cp=getComp(e,row.ctype);
      if(!cp)return`<td class="dc cn"><span class="cell-d" style="font-size:8px">—</span></td>`;
      const intv=row.ctype==='Propeller'?700:row.ctype==='Alternator Plate'?300:200;
      const nextAt=intv-(+cp.itemOH||0)+(+cp.engOH||0);
      const rem=nextAt-(+e.hrs||0);
      const cl=cHour(rem,intv);
      return`<td class="dc ${cl}"><span class="cell-d">${fmtHHMM(rem)}</span><span class="cell-s">@${fmtHHMM(nextAt)}</span><span class="mbar"><i style="width:${Math.max(0,Math.min(100,rem/intv*100)).toFixed(0)}%"></i></span></td>`;
    }
    return`<td class="dc cn">—</td>`;
  }

  let tbl=`<div class="ov-block" style="overflow-x:auto"><div class="ov-block-hdr">⚙ Engine Periodic Check — click cell to edit</div>
  <table class="pvt-lg"><thead><tr><th class="lh" style="min-width:120px">S/N</th>
  ${d.engines.map(e=>`<th class="ch ed" data-ek="num" data-id="${e.id}" data-list="engines" data-type="text" style="cursor:pointer"><span class="t">${e.num}</span><span class="s">${e.uav||'STORAGE'}</span></th>`).join('')}
  </tr></thead><tbody>`;
  checks.forEach(row=>{
    if(row.sep){tbl+=`<tr class="sep"><td colspan="${1+d.engines.length}"><span class="seplbl">${row.sep}</span></td></tr>`;return;}
    tbl+=`<tr><td class="rl">${row.lbl}</td>${d.engines.map(e=>eCell(e,row)).join('')}</tr>`;
  });
  tbl+=`</tbody></table></div>`;
  return`<div class="ov-center"><div class="page-wrap"><div class="ph"><div><div class="ph-title">Engine maintenance</div><div class="ph-sub">Click any cell to edit • HH:MM format for hours</div></div><button class="btn primary" data-a="add-engine">+ Add Engine</button></div>
  <div class="ov-grid">${tbl}</div></div></div>`;
}

function isWorkDay(d){const day=d.getDay();return day!==5&&day!==6}
function workDaysAfter(dateStr,n){
  if(!dateStr)return null;
  let d=new Date(dateStr);let count=0;
  while(count<n){d=new Date(d.getTime()+86400000);if(isWorkDay(d))count++;}
  return d;
}

function pgFlt(){
  const d=S.data;
  const fl=d.flights;
  const fa=d.faults;
  const totalFH=fl.reduce((s,f)=>s+(+f.total||0),0);
  const flSorted=[...fl].sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.id-a.id);
  const faSorted=[...fa].sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.id-a.id);
  const filtered=flightFilter?flSorted.filter(f=>
    (f.uav&&f.uav.toLowerCase().includes(flightFilter))||
    (f.base&&f.base.toLowerCase().includes(flightFilter))||
    (f.payload&&f.payload.toLowerCase().includes(flightFilter))||
    (f.objective&&f.objective.toLowerCase().includes(flightFilter))
  ):flSorted;

  /* Stats for charts */
  const now=new Date();
  const months=Array.from({length:12},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-11+i,1);return{label:d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}),key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}});
  const fhByMonth=months.map(m=>fl.filter(f=>f.date&&f.date.startsWith(m.key)).reduce((s,f)=>s+(+f.total||0),0));
  const faultCats={};
  fa.forEach(f=>{const c=f.system||'Other';faultCats[c]=(faultCats[c]||0)+1});
  const catLabels=Object.keys(faultCats);
  const catVals=catLabels.map(c=>faultCats[c]);
  const catColors=['#4a9eff','#2ea86b','#e05555','#4a90d9','#d97830','#9b59b6','#1abc9c'];

  const flightRows=filtered.map(f=>`<tr>
    <td class="dim">${fmtD(f.date)}</td>
    <td class="ed bld" data-ek="uav" data-id="${f.id}" data-list="flights" data-type="select_uav">${f.uav||'—'}</td>
    <td class="ed dim" data-ek="base" data-id="${f.id}" data-list="flights" data-type="select_base">${f.base||'—'}</td>
    <td class="ed dim" data-ek="payload" data-id="${f.id}" data-list="flights" data-type="select_payload">${f.payload||'—'}</td>
    <td class="ed mono" data-ek="to" data-id="${f.id}" data-list="flights" data-type="text">${f.to||'—'}</td>
    <td class="ed mono" data-ek="lnd" data-id="${f.id}" data-list="flights" data-type="text">${f.lnd||'—'}</td>
    <td>${+f.total>0?badge(fmtHHMM(+f.total),'bgold'):`<span class="mono" style="color:var(--text2)">—</span>`}</td>
    <td class="mono" style="color:var(--text2)">${f.engTot?fmtHHMM(+f.engTot):'—'}</td>
    <td class="ed" data-ek="objective" data-id="${f.id}" data-list="flights" data-type="select_objective">${f.objective||'—'}</td>
    <td class="ed ell-wide" data-ek="remarks" data-id="${f.id}" data-list="flights" data-type="textarea">${f.remarks||'—'}</td>
    <td><button class="btn sm danger" data-a="del-flight" data-id="${f.id}">✕</button></td>
  </tr>`).join('');

  const faultRows=faSorted.map(f=>`<tr>
    <td class="dim">${fmtD(f.date)}</td>
    <td class="ed" data-ek="uav" data-id="${f.id}" data-list="faults" data-type="select_uav">${f.uav||'—'}</td>

    <td class="ed" data-ek="subsystem" data-id="${f.id}" data-list="faults" data-type="text">${f.subsystem||'—'}</td>
    <td class="ed mono" data-ek="sn" data-id="${f.id}" data-list="faults" data-type="text">${f.sn||'—'}</td>
    <td class="ed" data-ek="tif" data-id="${f.id}" data-list="faults" data-type="text">${f.tif||'—'}</td>
    <td class="ed" data-ek="sentRepair" data-id="${f.id}" data-list="faults" data-type="select_svc_bool">${f.sentRepair?badge('Sent','by'):badge('No','bgr')}</td>
    <td class="ed ell-wide" data-ek="remarks" data-id="${f.id}" data-list="faults" data-type="textarea">${f.remarks||'—'}</td>
    <td><button class="btn sm danger" data-a="del-fault" data-id="${f.id}">✕</button></td>
  </tr>`).join('');

  setTimeout(()=>{
    const fhCtx=document.getElementById('fhChart');
    const faultCtx=document.getElementById('faultChart');
    if(fhCtx&&!fhCtx._chart){
      fhCtx._chart=new Chart(fhCtx,{type:'bar',data:{labels:months.map(m=>m.label),datasets:[{label:'Flight Hours',data:fhByMonth,backgroundColor:'rgba(74,158,255,.5)',borderColor:'rgba(74,158,255,.8)',borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8898b8',font:{size:9}},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#8898b8',font:{size:9},callback:v=>fmtHHMM(v)},grid:{color:'rgba(255,255,255,.05)'}}}}});
    }
    if(faultCtx&&!faultCtx._chart&&catLabels.length>0){
      faultCtx._chart=new Chart(faultCtx,{type:'pie',data:{labels:catLabels,datasets:[{data:catVals,backgroundColor:catColors.slice(0,catLabels.length),borderColor:'rgba(255,255,255,.1)',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8898b8',font:{size:9},boxWidth:10,padding:6}}}}});
    }
  },100);

  return`<div class="ov-center"><div class="page-wrap"><div class="ph"><div><div class="ph-title">Flights & faults</div><div class="ph-sub">Flight log and fault tracking</div></div>

    <div class="stat-div"></div>
    <div class="stat-item"><div class="stat-label">Total FH</div><div class="stat-val">${fmtHHMM(totalFH)}</div></div>
    <div class="stat-div"></div>
    <div class="stat-item"><div class="stat-label">Faults</div><div class="stat-val">${fa.length}</div></div>
    <div class="stat-div"></div>
    <div class="stat-item"><div class="stat-label">This Month</div><div class="stat-val">${fl.filter(f=>f.date&&f.date.startsWith(new Date().toISOString().slice(0,7))).length}</div></div>
  </div>
  <div class="chart-grid" style="display:grid;gap:10px;margin-bottom:14px">
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;height:220px">

      <div style="position:relative;height:168px"><canvas id="fhChart"></canvas></div>
    </div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;height:220px">
      <div style="font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Fault Categories</div>
      <div style="position:relative;height:168px"><canvas id="faultChart"></canvas>${catLabels.length===0?'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px">No faults logged</div>':''}</div>
    </div>
  </div>
  <div class="sdiv">Flight Log</div>
  <div class="search-bar">
    <input id="flt-search" type="text" placeholder="🔍 Search by UAV / Base / Payload / Objective..." value="${flightFilter}">

    <span style="font-size:10px;color:var(--text3)">${filtered.length}/${fl.length} shown</span>

  <thead><tr><th>Date</th><th>UAV</th><th>Base</th><th>Payload</th><th>T/O</th><th>LND</th><th>Total</th><th>Eng Time</th><th>Objective</th><th>Remarks/Failures</th><th></th></tr></thead>
  <tbody id="flt-tbody">${flightRows||'<tr><td colspan="11" style="text-align:center;padding:18px;color:var(--text3)">No flights logged</td></tr>'}</tbody>
  </table></div></div>
  <div class="sdiv">Fault Log</div>
  <div class="tbl-wrap"><div class="tbl-scroll" style="max-height:560px;overflow-y:auto"><table class="dt-c">
  <thead><tr><th>Date</th><th>UAV</th><th>System</th><th>Subsystem</th><th>S/N</th><th>TIF #</th><th>Sent</th><th>Remarks</th><th></th></tr></thead>
  <tbody>${faultRows||'<tr><td colspan="9" style="text-align:center;padding:18px;color:var(--text3)">No faults</td></tr>'}</tbody>
  </table></div></div></div></div>`;
}

function tpClose(){
  var d=document.getElementById('tp-drop');
  if(d)d.remove();
}

function tpOpen(field){
  tpClose();
  var hEl=document.getElementById('tp-'+field+'-h');
  var mEl=document.getElementById('tp-'+field+'-m');
  var curH=parseInt(hEl?hEl.textContent:0)||0;
  var curM=parseInt(mEl?mEl.textContent:0)||0;

  var drop=document.createElement('div');
  drop.id='tp-drop';
  drop.style.cssText='position:fixed;z-index:2000;background:#1a2035;border:1.5px solid rgba(74,158,255,.65);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.9);display:flex;overflow:hidden;';

  // Build hour column (0-23)
  var hCol=document.createElement('div');
  hCol.style.cssText='display:flex;flex-direction:column;overflow-y:auto;max-height:220px;min-width:60px;border-right:1px solid rgba(255,255,255,.1)';
  hCol.innerHTML='<div style="font-size:8px;font-weight:700;color:rgba(201,168,76,.8);text-transform:uppercase;letter-spacing:.07em;padding:5px;text-align:center;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0">Hour</div>';
  for(var h=0;h<=23;h++){
    var opt=document.createElement('div');
    opt.className='timepick-opt'+(h===curH?' active':'');
    opt.textContent=String(h).padStart(2,'0');
    opt.dataset.tp='h';opt.dataset.val=h;opt.dataset.field=field;
    hCol.appendChild(opt);
  }

  // Build minute column (0-59)
  var mCol=document.createElement('div');
  mCol.style.cssText='display:flex;flex-direction:column;overflow-y:auto;max-height:220px;min-width:60px';
  mCol.innerHTML='<div style="font-size:8px;font-weight:700;color:rgba(201,168,76,.8);text-transform:uppercase;letter-spacing:.07em;padding:5px;text-align:center;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0">Min</div>';
  for(var m=0;m<=59;m++){
    var opt2=document.createElement('div');
    opt2.className='timepick-opt'+(m===curM?' active':'');
    opt2.textContent=String(m).padStart(2,'0');
    opt2.dataset.tp='m';opt2.dataset.val=m;opt2.dataset.field=field;
    mCol.appendChild(opt2);
  }

  drop.appendChild(hCol);drop.appendChild(mCol);
  document.body.appendChild(drop);

  // Position below the timepick element
  var pickEl=document.getElementById('tp-'+field);
  if(pickEl){
    var r=pickEl.getBoundingClientRect();
    var top=r.bottom+4,left=r.left;
    if(top+230>window.innerHeight)top=r.top-234;
    if(left+130>window.innerWidth)left=window.innerWidth-135;
    drop.style.top=Math.max(4,top)+'px';
    drop.style.left=Math.max(4,left)+'px';
  }

  // Scroll to current values
  var activeH=hCol.querySelector('.active');if(activeH)activeH.scrollIntoView({block:'center'});
  var activeM=mCol.querySelector('.active');if(activeM)activeM.scrollIntoView({block:'center'});

  // Handle clicks on options
  drop.addEventListener('click',function(e){
    var opt=e.target.closest('.timepick-opt');
    if(!opt)return;
    var v=parseInt(opt.dataset.val);
    var vStr=String(v).padStart(2,'0');
    var f=opt.dataset.field;
    var p=opt.dataset.tp;
    var valEl=document.getElementById('tp-'+f+'-'+(p==='h'?'h':'m'));
    if(valEl)valEl.textContent=vStr;
    // Update active class in this column
    opt.closest('div').querySelectorAll('.timepick-opt').forEach(o=>o.classList.remove('active'));
    opt.classList.add('active');
    // Update hidden input
    var hv=document.getElementById('tp-'+f+'-h');
    var mv=document.getElementById('tp-'+f+'-m');
    var inp=document.getElementById('f'+f);
    if(inp&&hv&&mv)inp.value=hv.textContent+':'+mv.textContent;
    calcFT();calcET();
    // Don't close - let user pick both H and M, close on outside click
  });

  setTimeout(function(){
    document.addEventListener('click',function oc(e){
      if(!drop.contains(e.target)&&!e.target.closest('.timepick')){
        tpClose();document.removeEventListener('click',oc);
      }
    });
  },0);
}

function calcET(){
  var a=document.getElementById('fest'),b=document.getElementById('fesd');
  var dsp=document.getElementById('fengtotd'),hid=document.getElementById('fengtot');
  if(!a||!b||!dsp)return;
  var av=a.value,bv=b.value;
  if(av&&bv&&av.includes(':')&&bv.includes(':')){
    var s=parseHHMM(av),e=parseHHMM(bv);
    if(s!==null&&e!==null){
      var dur=((e-s)+24)%24;
      dsp.textContent=fmtHHMM(dur);
      if(hid)hid.value=dur;
      return;
    }
  }
  dsp.textContent='—';if(hid)hid.value='';
}
function calcFT(){
  var toInp=document.getElementById('fto');
  var lndInp=document.getElementById('flnd');
  var totD=document.getElementById('ftotd');
  var totI=document.getElementById('ftot');
  if(!toInp||!lndInp)return;
  var av=toInp.value, bv=lndInp.value;
  if(av&&bv&&av.includes(':')&&bv.includes(':')){
    var am=parseInt(av.slice(0,2))*60+parseInt(av.slice(3,5));
    var bm=parseInt(bv.slice(0,2))*60+parseInt(bv.slice(3,5));
    var mins=bm-am;
    if(mins<0)mins+=1440;
    var hh=Math.floor(mins/60), mm=mins%60;
    var s=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
    if(totD)totD.textContent=s;
    if(totI)totI.value=mins/60;
  } else {
    if(totD)totD.textContent='—';
  }
}

    '<button class="btn primary" id="st-backup">💾 Download Backup</button><button class="btn" id="st-restore">📂 Restore from File</button><input type="file" id="st-ri" accept=".json" style="display:none">')}

    '<button class="btn" id="st-excel">⬇ Export to Excel</button>')}
