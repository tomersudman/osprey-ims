<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Osprey IMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --bd:#30363d;--bd2:#444c56;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --blue:#1f6feb;--blue2:#388bfd;
  --green:#3fb950;--gbg:#0d2b1a;--gbd:#236b30;
  --red:#f85149;--rbg:#2d1214;--rbd:#5a2020;
  --amber:#e3b341;--abg:#271d05;
  --purple:#bc8cff;--pbg:#1e1233;--pbd:#6b3fcc;
}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.brand{font-size:15px;font-weight:600;display:flex;align-items:center;gap:10px}
.badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:1px}
.ntabs{display:flex;gap:2px}
.nb{background:none;border:none;color:var(--tx2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.nb:hover,.nb.on{background:var(--bg3);color:var(--tx)}
.nb.on{font-weight:500}
.main{padding:24px;max-width:1600px;margin:0 auto}
/* stat strip removed */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:10px}
.ctitle{font-size:13px;font-weight:500}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input,select,textarea{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);border-radius:7px;padding:0 10px;height:34px;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
textarea{height:auto;padding:8px 10px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:var(--tx3)}
select option{background:var(--bg3)}
.btn{height:34px;padding:0 14px;border-radius:7px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg4)}
.btn.bp{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.bp:hover{background:#1a5fcc}
.btn.bg{background:var(--gbg);border-color:var(--gbd);color:var(--green)}
.btn.bg:hover{background:#1a3d23}
.btn.br{background:var(--rbg);border-color:var(--rbd);color:var(--red)}
.btn.br:hover{background:#3d1619}
.btn.bpu{background:var(--pbg);border-color:var(--pbd);color:var(--purple)}
.btn.sm{height:28px;padding:0 10px;font-size:12px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none}
th:hover{color:var(--tx)}
th.asc::after{content:" ^"}th.desc::after{content:" v"}
td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr.rclick{cursor:pointer}
tbody tr.rclick:hover td{background:rgba(56,139,253,.07)}
.pn{font-size:13px;color:var(--tx)}
.apn{font-size:11px;color:var(--tx3)}
.sn{font-size:14px;font-weight:700;padding:2px 10px;border-radius:6px;display:inline-block;min-width:36px;text-align:center}
.sok{color:var(--green);background:var(--gbg)}
.slow{color:var(--amber);background:var(--abg)}
.scrit{color:var(--red);background:var(--rbg)}
.szero{color:var(--tx3);background:var(--bg3)}
.loctag{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:2px 8px;font-size:11px;color:var(--tx2);white-space:nowrap}
.tt{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500}
.ttLRU{background:#0d2a4a;color:#388bfd;border:1px solid #1f6feb}
.ttLRM{background:#271d05;color:#e3b341;border:1px solid #8a6a00}
.ttCons{background:#0d2b1a;color:#3fb950;border:1px solid #236b30}
.smrc{font-family:monospace;font-size:12px;color:var(--tx2)}
.txd{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;text-transform:uppercase}
.txdd{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.txdr{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}
.eok{color:var(--green);font-size:12px}
.esoon{color:var(--amber);font-size:12px;font-weight:500}
.egone{color:var(--red);font-size:12px;font-weight:500}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:20px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;width:720px;max-width:100%;margin:auto}
.mh{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--bd);gap:12px}
.mt{font-size:15px;font-weight:600}
.mc{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1;flex-shrink:0;padding:0}
.mc:hover{color:var(--tx)}
.mb{padding:20px 24px;max-height:75vh;overflow-y:auto}
.mf{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--bd)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{grid-column:1/-1}
.fl{font-size:12px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:500}
.ibox{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:16px}
.ds{margin-bottom:20px}
.dst{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.dg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.df{background:var(--bg3);border-radius:8px;padding:10px 12px}
.dfl{font-size:11px;color:var(--tx3);margin-bottom:3px}
.dfv{font-size:13px;font-weight:500}
.sb{margin:12px 0}
.sbl{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:4px}
.sbb{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.sbf{height:100%;border-radius:4px}
.tlh{display:grid;grid-template-columns:95px 55px 1fr 60px 70px 1fr;gap:8px;padding:6px 12px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--bd)}
.tlr{display:grid;grid-template-columns:95px 55px 1fr 60px 70px 1fr;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:12px;align-items:center}
.tlr:last-child{border-bottom:none}
.tlr:hover{background:rgba(255,255,255,.03)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.rb{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:16px}
.rh{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);font-weight:600;margin-bottom:12px}
.ms2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ms{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.msl{font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:3px}
.msv{font-size:18px;font-weight:600}
.rli{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.rli:last-child{border-bottom:none}
.rlin{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ah{display:grid;grid-template-columns:105px 58px 1fr 78px 110px 1fr;gap:8px;padding:7px 14px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--bd)}
.ar{display:grid;grid-template-columns:105px 58px 1fr 78px 110px 1fr;gap:8px;padding:8px 14px;border-bottom:1px solid var(--bd);font-size:12px;align-items:center}
.ar:last-child{border-bottom:none}
.ar:hover{background:rgba(255,255,255,.03)}
/* location map */
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:18px}
.map-cab{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.map-cab-title{padding:10px 14px;font-size:12px;font-weight:600;background:var(--bg4);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.map-floor{padding:6px 14px;border-bottom:1px solid var(--bd);font-size:11px}
.map-floor:last-child{border-bottom:none}
.map-floor-lbl{color:var(--tx3);font-size:10px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.map-item{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;cursor:pointer}
.map-item:hover{color:var(--blue2)}
/* qr label */
.qr-box{text-align:center;padding:20px}
.qr-svg{margin:12px auto;display:block}
/* role pills */
.role-admin{background:var(--rbg);color:var(--red);border-color:var(--rbd)}
.role-operator{background:var(--gbg);color:var(--green);border-color:var(--gbd)}
.role-viewer{background:var(--bg3);color:var(--tx2);border-color:var(--bd)}
/* user row */
.urow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px}
.urow:last-child{border-bottom:none}
mark{background:rgba(31,111,235,.25);color:var(--blue2);border-radius:2px}
.empty{padding:32px;text-align:center;color:var(--tx3);font-size:13px}
.hide-sm{display:table-cell}
@media(max-width:600px){.hide-sm{display:none}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
@media(max-width:768px){
  .topbar{height:auto;padding:8px 14px;gap:6px}
  .brand{font-size:13px}
  .ntabs{flex-wrap:wrap;gap:2px}
  .nb{padding:5px 8px;font-size:11px}
  .main{padding:10px}
  .stat-strip{flex-wrap:wrap}
  .stat-item{min-width:33%;flex:1 0 33%}
  .stat-divider{display:none}
  .fg,.dg4,.dg2{grid-template-columns:1fr}
  .r2{grid-template-columns:1fr}
  .tlh,.tlr{grid-template-columns:80px 50px 1fr 55px}
  .tlh > *:nth-child(n+5),.tlr > *:nth-child(n+5){display:none}
  .ah,.ar{grid-template-columns:90px 55px 1fr 70px}
  .ah > *:nth-child(n+5),.ar > *:nth-child(n+5){display:none}
  table{font-size:12px}
  th,td{padding:7px 8px}
  .bar{gap:5px}
  .bar input,.bar select{height:30px;font-size:12px}
  .btn{height:30px;padding:0 10px;font-size:12px}
  .modal{width:100% !important;border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:90vh}
  .ov{align-items:flex-end;padding:0}
  .mb{max-height:65vh}
  .map-grid{grid-template-columns:1fr 1fr;gap:8px;padding:10px}
  .sn{font-size:12px;padding:2px 6px}
}
@media(max-width:480px){
  .nb span,.nb-txt{display:none}
  .ntabs{gap:1px}
  .nb{padding:6px 10px;font-size:13px}
  .stat-item{min-width:50%;font-size:11px}
  .stat-val{font-size:22px}
}
</style>
</head>

</div>

</div>

// ── USERS & ROLES ─────────────────────────────────────────────────────────────
// Roles: admin = full access | operator = draw/receive/edit | viewer = read only
var DEFAULT_USERS = [
  {id:"1", name:"Admin", pin:"1234", role:"admin"},
  {id:"2", name:"Operator", pin:"0000", role:"operator"},
  {id:"3", name:"Viewer", pin:"9999", role:"viewer"}
];

var S = {
  items:[], tx:[], users:[], rma:[], tab:"inventory",
  search:"", fLoc:"", fSub:"", fType:"", fExp:"",
  sCol:"", sDir:1, modal:null,
  currentUser: null, _statFilter: null, _searchFocused: false
};

function canEdit()   { return S.currentUser && (S.currentUser.role === "admin" || S.currentUser.role === "operator"); }
function canAdmin()  { return S.currentUser && S.currentUser.role === "admin"; }
function roleCls(r)  { return r==="admin"?"role-admin":r==="operator"?"role-operator":"role-viewer"; }


// ── GOOGLE SHEETS BACKEND ────────────────────────────────────────────────────
// Replace this with your deployed Google Apps Script URL
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1wgZ3iFMvpJNA4iVk_cVsUFyYx5OEFFl9B1BWQts0OtVsryd-uGwtZD_g-HOHzqCwuA/exec";
var SYNC_INTERVAL = null;

function syncStatus() { return SCRIPT_URL && SCRIPT_URL.indexOf("script.google.com") >= 0; }

function loadFromSheets(callback) {
  if (!syncStatus()) { if(callback) callback(false); return; }
  showSyncBadge("loading");
  fetch(SCRIPT_URL + "?action=getAll", {method:"GET"})
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.items && d.items.length) {
        S.items = d.items;
        S.tx    = d.tx    || [];
        S.rma   = d.rma   || S.rma || [];
        if (d.users && d.users.length) S.users = d.users;
        S._syncState = "ok";
        showSyncBadge("ok");
        // If login modal is open, refresh the user dropdown
        var sel = document.getElementById("login-user");
        if (sel) {
          var opts = "";
          S.users.forEach(function(u){ opts += '<option value="'+esc(u.id)+'">'+esc(u.name)+' ('+u.role+')</option>'; });
          sel.innerHTML = opts;
        }
        if(callback) callback(true);
      } else { S._syncState="err"; showSyncBadge("err"); if(callback) callback(false); }
    })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); if(callback) callback(false); });
}

// Push a single item update to Sheets (upsert)
function pushItem(item) {
  if (!syncStatus()) return;
  fetch(SCRIPT_URL, {
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({action:"saveItem", item:item})
  }).then(function(r){return r.json();})
    .then(function(d){ S._syncState="ok"; showSyncBadge("ok"); })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); });
}

// Push a single new transaction to Sheets (append)
function pushTx(tx) {
  if (!syncStatus()) return;
  fetch(SCRIPT_URL, {
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({action:"saveTx", tx:tx})
  }).then(function(r){return r.json();})
    .then(function(d){ S._syncState="ok"; showSyncBadge("ok"); })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); });
}

// Full overwrite — only used for initial data seed from Users tab
function pushToSheets() {
  if (!syncStatus()) return;
  showSyncBadge("saving");
  fetch(SCRIPT_URL, {
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({action:"saveAll", items:S.items, tx:S.tx, users:S.users, rma:S.rma})
  }).then(function(r){return r.json();})
    .then(function(d){ S._syncState=d.ok?"ok":"err"; showSyncBadge(d.ok?"ok":"err"); })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); });
}

function showSyncBadge(state) {
  var el = document.getElementById("sync-badge");
  if (!el) return;
  var cfg = {
    loading: {txt:"Syncing...",  col:"var(--amber)", bg:"var(--abg)"},
    saving:  {txt:"Saving...",   col:"var(--amber)", bg:"var(--abg)"},
    ok:      {txt:"Live",        col:"var(--green)", bg:"var(--gbg)"},
    err:     {txt:"Offline",     col:"var(--red)",   bg:"var(--rbg)"}
  };
  var c = cfg[state] || cfg.err;
  el.textContent = c.txt;
  el.style.color = c.col;
  el.style.background = c.bg;
  el.style.borderColor = c.col;
}

function startAutoSync() {
  if (!syncStatus()) return;
  if (SYNC_INTERVAL) clearInterval(SYNC_INTERVAL);
  SYNC_INTERVAL = setInterval(function(){
    loadFromSheets(function(ok){ if(ok){ renderAll(); } });
  }, 30000); // refresh every 30 seconds
}

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var d = JSON.parse(raw);
      S.items = d.items || cp(SEED);
      S.tx    = d.tx    || [];
      S.users = d.users || cp(DEFAULT_USERS);
      S.rma   = d.rma   || [];
    } else {
      S.items = cp(SEED);
      S.tx    = [];
      S.users = cp(DEFAULT_USERS);
      S.rma   = [];
      save();
    }
  } catch(e) { S.items=cp(SEED); S.tx=[]; S.users=cp(DEFAULT_USERS); }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({items:S.items,tx:S.tx,users:S.users,rma:S.rma})); } catch(e) {}
}

// Save item locally + push just that item to Sheets
function saveAndPushItem(item) {
  save();
  showSyncBadge("saving");
  pushItem(item);
}

// Save tx locally + push just that tx to Sheets
function saveAndPushTx(tx) {
  save();
  showSyncBadge("saving");
  pushTx(tx);
}
function cp(x)  { return JSON.parse(JSON.stringify(x)); }
function gv(id) { var el=document.getElementById(id); return el?el.value:""; }
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fd(iso) {
  if (!iso) return "---";
  return new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}
function tod() { return new Date().toISOString().split("T")[0]; }
function uniq(f) { return[...new Set(S.items.map(function(i){return i[f];}).filter(Boolean))].sort(); }

function sst(item) {
  if (!item.qty) return "zero";
  var r = item.initialQty>0 ? item.qty/item.initialQty : 1;
  if (item.initialQty<=2) return item.qty<item.initialQty?"low":"ok";
  return r<=0.20?"crit":r<=0.40?"low":"ok";
}
function scls(item) { return{ok:"sok",low:"slow",crit:"scrit",zero:"szero"}[sst(item)]; }
function scell(item){ return'<span class="sn '+scls(item)+'">'+item.qty+'</span>'; }

function est(item) {
  if (!item.expiry) return null;
  var d = (new Date(item.expiry)-Date.now())/86400000;
  return d<0?"gone":d<=30?"soon":"ok";
}
function ecell(item) {
  var s=est(item);
  if (!s) return'<span style="color:var(--tx3);font-size:12px">---</span>';
  var cls={ok:"eok",soon:"esoon",gone:"egone"}[s];
  var pre=s==="gone"?"[!] ":s==="soon"?"[~] ":"";
  return'<span class="'+cls+'">'+pre+fd(item.expiry)+'</span>';
}

function hl(txt) {
  if (!S.search.trim()) return esc(txt);
  var q=S.search.trim().replace(/[-[\]{}()*+?.,\\^$|#]/g,"\\$&");
  return esc(String(txt)).replace(new RegExp("("+q+")","gi"),"<mark>$1</mark>");
}

function byCol(col){ if(S.sCol===col)S.sDir*=-1;else{S.sCol=col;S.sDir=1;} renderPage(); }
function thc(col) { return S.sCol===col?(S.sDir===1?"asc":"desc"):""; }

function filt() {
  var q=S.search.trim().toLowerCase();
  var items=S.items.filter(function(item){
    if(S._statFilter==="low"&&["low","crit"].indexOf(sst(item))<0)return false;
    if(S._statFilter==="zero"&&sst(item)!=="zero")return false;
    if(S._statFilter==="exp"){var se=est(item);if(se!=="soon"&&se!=="gone")return false;}
    if(!S._statFilter){
      if(q&&![item.name,item.pn,item.alt_pn||"",item.subsys||"",item.smr||""].some(function(v){return v.toLowerCase().indexOf(q)>=0;}))return false;
      if(S.fLoc&&item.location!==S.fLoc)return false;
      if(S.fSub&&item.subsys!==S.fSub)return false;
      if(S.fType&&item.type!==S.fType)return false;
      if(S.fExp){var es=est(item);if(S.fExp==="expiring"&&!(es==="soon"||es==="gone"))return false;if(S.fExp==="expired"&&es!=="gone")return false;}
    }
    return true;
  });
  if(S.sCol) items=items.slice().sort(function(a,b){
    var av=a[S.sCol],bv=b[S.sCol];
    if(S.sCol==="qty"||S.sCol==="initialQty"){av=+av||0;bv=+bv||0;}
    else{av=String(av||"").toLowerCase();bv=String(bv||"").toLowerCase();}
    return av<bv?-S.sDir:av>bv?S.sDir:0;
  });
  return items;
}

function wk() {
  var n=new Date(),d=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-(d===0?6:d-1)); m.setHours(0,0,0,0);
  var s=new Date(m); s.setDate(m.getDate()+6); s.setHours(23,59,59,999);
  return[m,s];
}
function mo() { var n=new Date(); return[new Date(n.getFullYear(),n.getMonth(),1),new Date(n.getFullYear(),n.getMonth()+1,0,23,59,59)]; }
function inr(t,r) { var d=new Date(t.date); return d>=r[0]&&d<=r[1]; }

    userRows += '<div class="login-user-row" data-uid="'+esc(u.id)+'" data-pin="'+esc(u.pin)+'" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;cursor:pointer;margin-bottom:6px;background:var(--bg3);border:1px solid var(--bd);transition:border .15s">'

      + '</div>';

    '<button class="btn sm" id="btn-change-user" style="font-size:11px">Change</button></div>'+
    '<label class="fl">PIN</label>'+
    '<input id="login-pin" type="password" placeholder="Enter PIN" style="width:100%" maxlength="8" autocomplete="off">'+
    '<input type="hidden" id="login-user">'+
    '</div>'+
    '<div id="login-err" style="color:var(--red);font-size:12px;margin-top:8px;display:none">Incorrect PIN. Try again.</div>'+
    '</div>'+
    '<div class="mf"><button class="btn bp" id="btn-login" style="display:none">Sign in</button></div>',
    true
  );
}

function doLogin() {
  var uid=gv("login-user"), pin=gv("login-pin");
  var user=S.users.find(function(u){return u.id===uid;});
  if (!user||user.pin!==pin) {
    var err=document.getElementById("login-err");
    if(err){err.style.display="block";}
    return;
  }
  S.currentUser=user;
  closeModal();
  updateRoleBadge();
  renderAll();
  // If came from QR scan, open that item automatically
  if (S._deepLinkItemId) {
    var dlItem = S.items.find(function(i){ return i.id === S._deepLinkItemId; });
    if (dlItem) {
      S.modal = {type:"detail", id:S._deepLinkItemId};
      showModal(detailHTML(dlItem));
    }
    S._deepLinkItemId = null;
  }
}

function doLogout() {
  S.currentUser=null;
  renderAll();
  showLogin();
}

function updateRoleBadge() {
  var el=document.getElementById("role-badge");
  if (!el) return;
  if (!S.currentUser) { el.textContent="Not signed in"; el.className=""; el.style.cssText="font-size:11px;padding:3px 10px;border-radius:12px;background:var(--rbg);border:1px solid var(--rbd);color:var(--red);cursor:pointer"; return; }
  el.textContent=S.currentUser.name+" ("+S.currentUser.role+")";
  el.className=roleCls(S.currentUser.role);
  el.style.cssText="font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid;cursor:pointer";

// ── QR renderer: decode packed matrix and draw to canvas ─────────────────────
function getQRForItem(itemId) {
  return QR_MAP[String(itemId)] || null;
}

function drawQRFromPacked(canvas, packed) {
  // Decode: base64 -> bytes, first byte = SIZE, rest = bit-packed matrix
  var b64 = packed;
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  var SIZE = bytes[0];
  var CANVAS_PX = 280;
  var QUIET = 4; // modules
  var cell = Math.floor(CANVAS_PX / (SIZE + QUIET * 2));
  var offset = Math.floor((CANVAS_PX - cell * SIZE) / 2);
  canvas.width = CANVAS_PX;
  canvas.height = CANVAS_PX;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CANVAS_PX, CANVAS_PX);
  ctx.fillStyle = '#000000';
  var byteIdx = 1, bitIdx = 7;
  for (var r = 0; r < SIZE; r++) {
    for (var c = 0; c < SIZE; c++) {
      var bit = (bytes[byteIdx] >> bitIdx) & 1;
      bitIdx--;
      if (bitIdx < 0) { bitIdx = 7; byteIdx++; }
      if (bit) ctx.fillRect(offset + c*cell, offset + r*cell, cell, cell);
    }
  }
}

function makeQR(text) {
  return '<div id="qr-canvas-wrap" data-qr="'+encodeURIComponent(text)+'" style="width:280px;height:280px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:4px;margin:0 auto"><span style="color:#aaa;font-size:12px">Loading...</span></div>';
}

function renderQRIntoDOM() {
  var wrap = document.getElementById('qr-canvas-wrap');
  if (!wrap) return;
  var text = decodeURIComponent(wrap.getAttribute('data-qr'));
  // Extract item ID from URL
  var match = text.match(/[?&]item=([^&]+)/);
  var itemId = match ? match[1] : null;
  var packed = itemId ? getQRForItem(itemId) : null;
  var canvas = document.createElement('canvas');
  canvas.style.display = 'block';
  canvas.style.borderRadius = '4px';
  if (packed) {
    drawQRFromPacked(canvas, packed);
    wrap.innerHTML = '';
    wrap.style.width = '280px';
    wrap.style.height = '280px';
    wrap.appendChild(canvas);
  } else {
    // Fallback for new items not in map: show URL as text
    wrap.innerHTML = '<div style="padding:12px;font-size:10px;color:#333;word-break:break-all;background:#fff;width:280px;text-align:center"><b>New item QR</b><br><br>'+text+'<br><br><small>Rescan after uploading to GitHub</small></div>';
  }
}


function showLabel(id) {
  var item=S.items.find(function(i){return i.id===id;});
  if(!item)return;
  // Encode the app URL with item ID so scanning opens the app to that item
  var baseUrl = window.location.href.split("?")[0].split("#")[0];
  var deepLink = baseUrl + "?item=" + encodeURIComponent(item.id);
  var qr = makeQR(deepLink);
  showModal(
    '<div class="mh"><div><div class="mt">Label & QR Code</div><div style="font-size:12px;color:var(--tx2);margin-top:3px">'+esc(item.pn)+'</div></div>'+
    '<button class="mc" id="modal-close-btn">x</button></div>'+
    '<div class="mb"><div class="qr-box">'+
    '<div class="qr-svg" style="text-align:center;margin:12px 0">'+qr+'</div>'+
    '<div style="font-size:18px;font-weight:700;margin:10px 0 4px">'+esc(item.pn)+'</div>'+
    '<div style="font-size:13px;color:var(--tx2);margin-bottom:6px">'+esc(item.name)+'</div>'+
    '<div style="font-size:12px;color:var(--tx3)">'+esc(item.location)+(item.floor&&item.floor!=="0"?' / Floor '+item.floor:'')+'</div>'+
    (item.type?'<div style="font-size:12px;color:var(--tx3);margin-top:4px">'+item.type+(item.smr?' / SMR: '+esc(item.smr):'')+'</div>':'')+
    '<div style="margin-top:10px;background:var(--bg3);border-radius:6px;padding:8px;font-size:10px;color:var(--tx3);word-break:break-all">Scan opens app to this item</div>'+
    '</div></div>'+
    '<div class="mf"><button class="btn" id="btn-print-label" style="margin-right:auto">Print label</button><button class="btn" id="modal-close-btn2">Close</button></div>'
  );
  document.getElementById("btn-print-label").onclick=function(){ doPrintLabel(item); };
  // Render QR into DOM now that modal is in place
  setTimeout(function(){ renderQRIntoDOM(); }, 10);
}

function doPrintLabel(item) {
  // Get the canvas from the modal QR target
  var target = document.getElementById("qr-target");
  var canvas = target ? target.querySelector("canvas") : null;
  var qrDataUrl = canvas ? canvas.toDataURL() : "";

  var w = window.open("","_blank","width=440,height=600");
  w.document.write(
    '<!DOCTYPE html><html><head><title>Label - '+esc(item.pn)+'</title>'+
    '<style>'+
    'body{font-family:Arial,sans-serif;padding:24px;background:#fff;color:#000;text-align:center}'+

// ── LOCATION MAP ──────────────────────────────────────────────────────────────
function renderMap() {
  var byLoc={};
  S.items.forEach(function(item){
    var loc=item.location||"Unknown";
    if(!byLoc[loc]) byLoc[loc]={};
    var fl=item.floor||"0";
    if(!byLoc[loc][fl]) byLoc[loc][fl]=[];
    byLoc[loc][fl].push(item);
  });
  var locs=Object.keys(byLoc).sort();
  var html='<div class="card"><div class="ch"><div class="ctitle">Location Map</div>'+
    '<span style="font-size:12px;color:var(--tx2)">Click any item to view details</span></div>'+
    '<div class="map-grid">';
  locs.forEach(function(loc){
    var floors=Object.keys(byLoc[loc]).sort();
    var alerts=0;
    Object.values(byLoc[loc]).forEach(function(arr){arr.forEach(function(item){if(sst(item)!=="ok"&&sst(item)!=="zero"||sst(item)==="zero")alerts++;});});
    html+='<div class="map-cab"><div class="map-cab-title"><span>'+esc(loc)+'</span>'+
      (alerts?'<span style="background:var(--rbg);color:var(--red);border-radius:10px;padding:1px 7px;font-size:11px">'+alerts+' alert'+(alerts>1?'s':'')+'</span>':
      '<span style="color:var(--green);font-size:11px">OK</span>')+'</div>';
    floors.forEach(function(fl){
      html+='<div class="map-floor"><div class="map-floor-lbl">'+(fl==="0"?"Ground":fl==="1"?"Floor 1":fl==="2"?"Floor 2":fl==="3"?"Floor 3":fl==="4"?"Floor 4":"Floor "+fl)+'</div>';
      byLoc[loc][fl].forEach(function(item){
        var sc=sst(item);
        var dot=sc==="ok"?"var(--green)":sc==="low"?"var(--amber)":sc==="crit"||sc==="zero"?"var(--red)":"var(--tx3)";
        html+='<div class="map-item" data-action="detail" data-id="'+esc(item.id)+'">'+
          '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;font-size:12px">'+esc(item.name)+'</span>'+
          '<span style="display:flex;align-items:center;gap:4px;flex-shrink:0"><span style="width:8px;height:8px;border-radius:50%;background:'+dot+';display:inline-block"></span>'+
          '<span class="sn '+scls(item)+'" style="font-size:11px;padding:1px 6px;min-width:24px">'+item.qty+'</span></span></div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });
  html+='</div></div>';
  return html;
}

function doAddUser() {
  var name=gv("u-name").trim(), pin=gv("u-pin").trim(), role=gv("u-role");
  if(!name){alert("Enter a name.");return;}
  if(!pin||pin.length<4){alert("PIN must be at least 4 digits.");return;}
  S.users.push({id:String(Date.now()),name:name,pin:pin,role:role});
  save();
  if(syncStatus()){showSyncBadge("saving");fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"saveUsers",users:S.users})}).then(function(r){return r.json();}).then(function(){showSyncBadge("ok");}).catch(function(){showSyncBadge("err");});}
  closeModal(); renderAll();
}

function delUser(id) {
  if(!confirm("Remove this user?"))return;
  S.users=S.users.filter(function(u){return u.id!==id;});
  save(); renderAll();
}

// ── REPORTS PAGE ──────────────────────────────────────────────────────────────
function renderReports(){
  var wr=wk(),mr=mo();
  var wt=S.tx.filter(function(t){return inr(t,wr);}),mt=S.tx.filter(function(t){return inr(t,mr);});

  // RMA summary
  var rma_open=S.rma.filter(function(r){return r.status==="open";}).length;
  var rma_ship=S.rma.filter(function(r){return r.status==="shipped";}).length;
  var rma_recv=S.rma.filter(function(r){return r.status==="received";}).length;
  var ai=S.items.filter(function(i){return["low","crit","zero"].indexOf(sst(i))>=0;});
  var xi=S.items.filter(function(i){var s=est(i);return s==="soon"||s==="gone";});
  function rblock(title,txs){
    var draws=txs.filter(function(t){return t.type==="draw";}),recvs=txs.filter(function(t){return t.type==="receive";});
    var dq=draws.reduce(function(s,t){return s+t.qty;},0),rq=recvs.reduce(function(s,t){return s+t.qty;},0);
    var bi={},bp={},br={};
    draws.forEach(function(t){var n=(S.items.find(function(i){return i.id===t.itemId;})||{name:t.itemName}).name;bi[n]=(bi[n]||0)+t.qty;bp[t.person]=(bp[t.person]||0)+t.qty;if(t.reasonCode)br[t.reasonCode]=(br[t.reasonCode]||0)+1;});
    var ti=Object.entries(bi).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
    var tp=Object.entries(bp).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
    var tr2=Object.entries(br).sort(function(a,b){return b[1]-a[1];}).slice(0,4);
    var h='<div class="rb"><div class="rh">'+title+'</div>'+
      '<div class="ms2"><div class="ms"><div class="msl">Draws</div><div class="msv" style="color:var(--red)">'+draws.length+'</div><div style="font-size:10px;color:var(--tx3)">'+dq+' units</div></div>'+
      '<div class="ms"><div class="msl">Receives</div><div class="msv" style="color:var(--green)">'+recvs.length+'</div><div style="font-size:10px;color:var(--tx3)">'+rq+' units</div></div></div>';
    h+='<div style="font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Top drawn items</div>';
    if(!ti.length)h+='<div style="font-size:12px;color:var(--tx3)">No draws this period</div>';
    else ti.forEach(function(x){h+='<div class="rli"><span class="rlin">'+esc(x[0].length>44?x[0].slice(0,44)+"...":x[0])+'</span><span style="font-weight:600;color:var(--red)">-'+x[1]+'</span></div>';});
    if(tp.length){h+='<div style="font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;margin:12px 0 8px">By person</div>';tp.forEach(function(x){h+='<div class="rli"><span class="rlin">'+esc(x[0])+'</span><span style="font-weight:600">'+x[1]+' units</span></div>';});}
    if(tr2.length){h+='<div style="font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;margin:12px 0 8px">By reason</div>';tr2.forEach(function(x){h+='<div class="rli"><span class="rlin">'+esc(x[0])+'</span><span style="font-weight:600">'+x[1]+' events</span></div>';});}
    return h+'</div>';
  }

// ── SUBMIT ACTIONS ────────────────────────────────────────────────────────────
function submitTx(){
  var qty=parseInt(gv("m-qty"))||0, date=gv("m-date")||tod();
  var person=gv("m-person").trim(), reason=gv("m-reason"), purpose=gv("m-purpose");
  var isOut=S.modal.type==="draw";
  if(!qty){alert("Please enter a valid quantity.");return;}
  if(!person){alert("Please enter the person name.");return;}
  if(isOut&&!reason){alert("Please select a reason code.");return;}
  var item=S.items.find(function(i){return i.id===S.modal.id;});
  if(isOut&&qty>item.qty){alert("Only "+item.qty+" unit(s) in stock.");return;}
  item.qty=isOut?item.qty-qty:item.qty+qty;
  var newTx = {id:String(Date.now()),itemId:item.id,itemName:item.name,type:S.modal.type,qty:qty,date:date,person:person,purpose:purpose,reasonCode:reason||"",remaining:item.qty,ts:Date.now()};
  S.tx.push(newTx);
  saveAndPushTx(newTx);
  pushItem(item); // also update item qty in sheet
  closeModal(); renderAll();
}

function submitItem(id){
  var name=gv("m-name").trim(), loc=gv("m-location").trim();
  if(!name){alert("Please enter a description.");return;}
  if(!loc){alert("Please enter a location.");return;}
  var item;
  if(id){
    item=S.items.find(function(i){return i.id===id;});
    item.pn=gv("m-pn")||"---"; item.alt_pn=gv("m-altpn"); item.name=name;
    item.subsys=gv("m-subsys"); item.type=gv("m-type"); item.smr=gv("m-smr");
    item.sn=gv("m-sn"); item.location=loc; item.floor=gv("m-floor");
    item.expiry=gv("m-expiry"); item.notes=gv("m-notes");
  } else {
    var qty=parseInt(gv("m-qty"))||0;
    item={id:String(Date.now()),pn:gv("m-pn")||"---",alt_pn:gv("m-altpn"),
      name:name,subsys:gv("m-subsys"),type:gv("m-type"),smr:gv("m-smr"),
      sn:gv("m-sn"),location:loc,floor:gv("m-floor"),expiry:gv("m-expiry"),
      notes:gv("m-notes"),qty:qty,initialQty:qty};
    S.items.push(item);
  }
  saveAndPushItem(item);
  closeModal(); renderAll();
}


// ── RMA SYSTEM ────────────────────────────────────────────────────────────────
function renderRMA() {
  var open     = S.rma.filter(function(r){return r.status==="open";});
  var shipped  = S.rma.filter(function(r){return r.status==="shipped";});
  var received = S.rma.filter(function(r){return r.status==="received";});
  var closed   = S.rma.filter(function(r){return r.status==="closed";});

  function rmaTable(title, list, showActions) {
    if (!list.length) return "";
    var rows="";
    list.forEach(function(r){
      var item=S.items.find(function(i){return i.id===r.itemId;});
      var statusCls="rma-"+r.status;
      rows+='<tr>'
        +'<td><span class="pn">'+esc(r.rmaNum)+'</span></td>'
        +'<td><div>'+esc(item?item.name:r.itemName)+'</div><div style="font-size:11px;color:var(--tx3)">'+esc(item?item.pn:r.itemPn)+'</div></td>'
        +'<td><span class="smrc">'+esc(r.sn||"---")+'</span></td>'
        +'<td style="font-size:12px;color:var(--tx2)">'+esc(r.fault)+'</td>'
        +'<td><span class="rma-status '+statusCls+'">'+r.status.toUpperCase()+'</span></td>'
        +'<td style="font-size:12px;color:var(--tx2)">'+fdate(r.dateOpened)+'</td>'
        +'<td style="font-size:12px;color:var(--tx2)">'+(r.dateShipped?fdate(r.dateShipped):"---")+'</td>'
        +'<td style="font-size:12px;color:var(--tx2)">'+(r.dateReceived?fdate(r.dateReceived):"---")+'</td>'
        +'<td style="font-size:12px;color:var(--tx2)">'+esc(r.snReceived||r.sn||"---")+'</td>'
        +'<td style="font-size:12px;color:var(--tx2)">'+esc(r.notes||"---")+'</td>'
        +'<td>'+( showActions && r.status==="open" && canEdit() ? '<button class="btn sm bpu" id="btn-rma-ship" data-id="'+esc(r.id)+'">Ship</button>' : "")
               +( showActions && r.status==="shipped" && canEdit() ? '<button class="btn sm bg" id="btn-rma-receive" data-id="'+esc(r.id)+'">Receive back</button>' : "")
        +'</td>'
        +'</tr>';
    });
    return '<div style="margin-bottom:4px;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;padding:10px 18px 4px">'+title+' ('+list.length+')</div>'
      +'<div class="tbl-wrap"><table><thead><tr>'
      +'<th>RMA #</th><th>Item</th><th>S/N Out</th><th>Fault Description</th><th>Status</th>'
      +'<th>Opened</th><th>Shipped</th><th>Received</th><th>S/N In</th><th>Notes</th><th>Action</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  return '<div class="card"><div class="ch">'
    +'<div class="ctitle">RMA — Items for Repair <span style="color:var(--tx3);font-weight:400;margin-left:4px">'+S.rma.length+' total</span></div>'
    +(canEdit()?'<button class="btn bp" id="btn-rma-open">+ Open RMA</button>':'')+
    '</div>'
    +rmaTable("Awaiting shipment", open, true)
    +rmaTable("Shipped to Israel", shipped, true)
    +rmaTable("Received back", received, false)
    +rmaTable("Closed", closed, false)
    +(!S.rma.length?'<div class="empty">No RMA records yet.</div>':"")+
    "</div>";
}

function submitRMA() {
  var itemId=gv("rma-item"), sn=gv("rma-sn").trim(), fault=gv("rma-fault").trim();
  if(!itemId){alert("Please select an item.");return;}
  if(!sn){alert("Please enter the serial number.");return;}
  if(!fault){alert("Please describe the fault.");return;}
  var item=S.items.find(function(i){return i.id===itemId;});
  var num="RMA-"+String(Date.now()).slice(-6);
  var rec={id:String(Date.now()),rmaNum:num,itemId:itemId,itemName:item.name,itemPn:item.pn,
    sn:sn,fault:fault,status:"open",dateOpened:gv("rma-date")||tod(),
    dateShipped:"",dateReceived:"",snReceived:"",notes:gv("rma-notes")};
  S.rma.push(rec);
  save();
  closeModal();
  S.tab="rma";
  document.querySelectorAll(".nb").forEach(function(b){b.classList.toggle("on",b.id==="ntab-rma");});
  renderAll();
  alert("RMA "+num+" opened successfully.");
}

function shipRMA(id) {
  var rec=S.rma.find(function(r){return r.id===id;});
  if(!rec)return;
  var date=prompt("Enter ship date (YYYY-MM-DD):",tod());
  if(!date)return;
  rec.status="shipped"; rec.dateShipped=date;
  save(); renderAll();
}

function receiveRMA(id) {
  var rec=S.rma.find(function(r){return r.id===id;});
  if(!rec)return;
  var snIn=prompt("Enter received S/N (leave blank if same as sent: "+rec.sn+"):",rec.sn);
  if(snIn===null)return;
  var date=prompt("Enter receive date (YYYY-MM-DD):",tod());
  if(!date)return;
  rec.status="received";
  rec.dateReceived=date;
  rec.snReceived=snIn||rec.sn;
  // Add the item back to inventory
  var item=S.items.find(function(i){return i.id===rec.itemId;});
  if(item){
    item.qty+=1;
    if(snIn && snIn!==rec.sn) item.sn=snIn; // update SN if different
    saveAndPushItem(item);
  }
  var newTx={id:String(Date.now()),itemId:rec.itemId,itemName:rec.itemName,
    type:"receive",qty:1,date:date,person:S.currentUser?S.currentUser.name:"RMA",
    purpose:"RMA return - "+rec.rmaNum+(snIn!==rec.sn?" (new S/N: "+snIn+")":""),
    reasonCode:"Return",remaining:item?item.qty:0,ts:Date.now()};
  S.tx.push(newTx);
  saveAndPushTx(newTx);
  save(); renderAll();
  alert("RMA "+rec.rmaNum+" received back. Item returned to inventory.");
}

function setTab(tab){
  S.tab=tab;
  ["inventory","log","reports","audit","rma","map","users"].forEach(function(t){
    var el=document.getElementById("ntab-"+t);
    if(el) el.classList.toggle("on",t===tab);
  });

function renderPage(){
  var scrollY=window.scrollY;
  var srchVal=S.search, srchPos=0;
  var oldSrch=document.getElementById("srch");
  if(oldSrch) srchPos=oldSrch.selectionStart||srchVal.length;
  var h="";
  if(S.tab==="inventory") h=renderInventory();
  else if(S.tab==="log") h=renderLog();
  else if(S.tab==="reports") h=renderReports();
  else if(S.tab==="audit") h=renderAudit();
  else if(S.tab==="rma") h=renderRMA();
  else if(S.tab==="map") h=renderMap();
  else if(S.tab==="users") h=renderUsers();
  document.getElementById("pg").innerHTML=h;
  window.scrollTo(0,scrollY);
  if(S.tab==="inventory"){
    var inp=document.getElementById("srch");
    if(inp&&document.activeElement!==inp&&S._searchFocused){
      inp.focus(); inp.setSelectionRange(srchPos,srchPos);
    }
  }
}
function renderAll(){ renderStats(); renderPage(); }

// ── GLOBAL EVENT LISTENERS ────────────────────────────────────────────────────
document.addEventListener("click", function(ev){
  var t=ev.target;

  // --- stat strip clicks ---
  var si=t.closest("[data-stat]");
  if(si){
    var sta=si.getAttribute("data-stat");
    S.tab="inventory";
    ["inventory","log","reports","audit","map","users"].forEach(function(tb){var el=document.getElementById("ntab-"+tb);if(el)el.classList.toggle("on",tb==="inventory");});
    if(sta==="filter-low"){S.fLoc="";S.fSub="";S.fType="";S.fExp="";S.search="";S._statFilter="low";}
    else if(sta==="filter-zero"){S.fLoc="";S.fSub="";S.fType="";S.fExp="";S.search="";S._statFilter="zero";}
    else if(sta==="filter-exp"){S.fLoc="";S.fSub="";S.fType="";S.fExp="";S.search="";S._statFilter="exp";}
    renderPage();
    return;
  }

  // --- tab buttons (by element id) ---
  if(t.id==="ntab-inventory"||t.id==="ntab-log"||t.id==="ntab-reports"||t.id==="ntab-audit"||t.id==="ntab-rma"||t.id==="ntab-map"||t.id==="ntab-users"){
    setTab(t.id.replace("ntab-","")); return;
  }

  // --- role badge = logout ---
  if(t.id==="role-badge"){ doLogout(); return; }

  // --- static button IDs in inventory toolbar ---
  if(t.id==="btn-clear"){S.search="";S.fLoc="";S.fSub="";S.fType="";S.fExp="";S._statFilter=null;renderPage();return;}
  if(t.id==="btn-clearstatf"){S._statFilter=null;renderPage();return;}
  if(t.id==="btn-xcsv"){xcsv();return;}
  if(t.id==="btn-add"){if(!canEdit())return;S.modal={type:"add"};showModal(buildItemModal(null));return;}
  if(t.id==="btn-xtcsv"){xtcsv();return;}
  if(t.id==="btn-adduser"){if(!canAdmin())return;showModal(buildAddUserModal());return;}
  if(t.id==="btn-rma-open"){if(!canEdit())return;openRMAModal(null);return;}
  if(t.id==="btn-rma-submit"){submitRMA();return;}
  if(t.id==="btn-rma-ship"){shipRMA(t.getAttribute("data-id"));return;}
  if(t.id==="btn-rma-receive"){receiveRMA(t.getAttribute("data-id"));return;}
  if(t.id==="btn-pushall"){if(!canAdmin())return;if(confirm("Push ALL current data to Google Sheets? This will overwrite the sheet with your current data."))pushToSheets();return;}
  if(t.id==="btn-saveuser"){doAddUser();return;}
  if(t.id==="btn-login"){doLogin();return;}
  if(t.id==="btn-change-user"){
    document.getElementById("login-pin-section").style.display="none";
    document.getElementById("btn-login").style.display="none";
    document.getElementById("login-err").style.display="none";
    return;
  }
  var urow = t.closest(".login-user-row");
  if(urow){
    var uid=urow.getAttribute("data-uid");
    var uname=S.users.find(function(u){return u.id===uid;});
    document.getElementById("login-user").value=uid;
    document.getElementById("login-selected-name").textContent=uname?uname.name:"";
    document.getElementById("login-pin-section").style.display="block";
    document.getElementById("btn-login").style.display="inline-flex";
    document.getElementById("login-err").style.display="none";
    document.getElementById("login-pin").value="";
    setTimeout(function(){document.getElementById("login-pin").focus();},50);
    return;
  }

  // --- modal close buttons ---
  if(t.id==="modal-close-btn"||t.id==="modal-close-btn2"){closeModal();return;}

  // --- modal submit buttons ---
  if(t.id==="btn-submit-tx"){submitTx();return;}
  if(t.id==="btn-submit-item"){submitItem(t.getAttribute("data-id")||null);return;}

  // --- detail modal action buttons ---
  if(t.id==="btn-draw-item"){var did=t.getAttribute("data-id");closeModal();S.modal={type:"draw",id:did};showModal(buildTxModal(did,"draw"));return;}
  if(t.id==="btn-recv-item"){var rid=t.getAttribute("data-id");closeModal();S.modal={type:"receive",id:rid};showModal(buildTxModal(rid,"receive"));return;}
  if(t.id==="btn-edit-item"){var eid=t.getAttribute("data-id");closeModal();S.modal={type:"edit",id:eid};showModal(buildItemModal(eid));return;}
  if(t.id==="btn-label-item"){showLabel(t.getAttribute("data-id"));return;}
  if(t.id==="btn-print-label"){return;} // handled by onclick set in showLabel

  // --- data-action elements (rows, draw/recv buttons in table) ---
  var el=t.closest("[data-action]");
  if(el){
    var a=el.getAttribute("data-action"), id=el.getAttribute("data-id");
    if(a==="detail"){
      var item=S.items.find(function(i){return i.id===id;});
      if(item){S.modal={type:"detail",id:id};showModal(detailHTML(item));}
      return;
    }
    if(a==="draw"){if(!canEdit())return;S.modal={type:"draw",id:id};showModal(buildTxModal(id,"draw"));return;}
    if(a==="receive"){if(!canEdit())return;S.modal={type:"receive",id:id};showModal(buildTxModal(id,"receive"));return;}
    if(a==="delUser"){delUser(id);return;}
    return;
  }

  // --- sort column headers ---
  var th=t.closest("th[data-sort]");
  if(th){byCol(th.getAttribute("data-sort"));return;}
});

document.addEventListener("change",function(ev){
  var id=ev.target.id;
  if(id==="fLoc"){S.fLoc=ev.target.value;renderPage();}
  else if(id==="fSub"){S.fSub=ev.target.value;renderPage();}
  else if(id==="fType"){S.fType=ev.target.value;renderPage();}
  else if(id==="fExp"){S.fExp=ev.target.value;renderPage();}
});

document.addEventListener("input",function(ev){
  if(ev.target.id==="srch"){S.search=ev.target.value;S._searchFocused=true;renderPage();}
});
document.addEventListener("focusout",function(ev){
  if(ev.target.id==="srch") S._searchFocused=false;
});
document.addEventListener("keydown",function(ev){
  if(ev.key==="Enter"&&ev.target.id==="login-pin"){doLogin();}
});

// ── INIT ──────────────────────────────────────────────────────────────────────
load(); // load from localStorage first (instant)
renderAll();
updateRoleBadge();
// Then pull live data from Google Sheets (if configured)
if (syncStatus()) {
  document.getElementById("sync-badge").style.display = "inline";
  showSyncBadge("loading");
  loadFromSheets(function(ok) {
    if (ok) { renderAll(); }
    startAutoSync();
    // After load, check for deep-link item param
    checkDeepLink();
  });
} else {
  checkDeepLink();
}
showLogin();

function checkDeepLink() {
  // If URL has ?item=ID, open that item's detail panel after login
  var params = new URLSearchParams(window.location.search);
  var itemId  = params.get("item");
  if (!itemId) return;
  var item = S.items.find(function(i){ return i.id === itemId; });
  if (!item) return;
  // Store for use after login
  S._deepLinkItemId = itemId;
  // Show a banner
  var banner = document.createElement("div");
  banner.style.cssText = "position:fixed;top:0;left:0;right:0;background:var(--blue);color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:500;z-index:300";
  banner.textContent = "Scan detected: " + item.pn + " — " + item.name + ". Sign in to view.";
  document.body.appendChild(banner);
  setTimeout(function(){ if(banner.parentNode) banner.parentNode.removeChild(banner); }, 5000);
}

</script>
