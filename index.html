  `;
}

function _mondayOf(d){const x=new Date(d);const dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);return x;}
function repDefaultFrom(){return _mondayOf(new Date()).toISOString().slice(0,10);}
function repDefaultTo(){const m=_mondayOf(new Date());m.setDate(m.getDate()+6);return m.toISOString().slice(0,10);}
function downloadWordReport(){
  const d=S.data;
  const fromV=(document.getElementById('rep-from')||{}).value||repDefaultFrom();
  const toV=(document.getElementById('rep-to')||{}).value||repDefaultTo();
  const fromD=new Date(fromV+'T00:00:00'), toD=new Date(toV+'T23:59:59');
  const fmtLong=s=>new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
  const gen=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const svcTxt=v=>v==='YES'?'Serviceable':v==='NO'?'Unserviceable':v==='PARTIALLY'?'Partially Svc':v||'—';
  const svcColor=v=>v==='YES'?'#2e7d32':v==='NO'?'#c62828':v==='PARTIALLY'?'#e08d00':'#666';
  const inRange=dstr=>{if(!dstr)return false;const x=new Date(dstr+'T12:00:00');return x>=fromD&&x<=toD;};
  const statusChip=(txt,color)=>`<span style="color:${color};font-weight:bold">${esc(txt)}</span>`;
  // nearest upcoming date-based maintenance for an item across given [key,freq] checks
  const nextDue=(obj,checks)=>{
    let best=null;
    checks.forEach(c=>{const v=obj[c.key];if(!v)return;const due=addInt(v,c.freq);if(!due)return;const days=du(due);if(best===null||days<best.days)best={lbl:c.lbl,due,days};});
    if(!best)return'—';
    const dtxt=fmtD(best.due);
    return best.days<0?`${esc(best.lbl)} — OVERDUE (${dtxt})`:`${esc(best.lbl)} — ${dtxt} (${best.days}d)`;
  };
  const UAV_CHK=[{key:'monthly',freq:'monthly',lbl:'Monthly'},{key:'q3',freq:'3m',lbl:'3-Month'},{key:'q6',freq:'6m',lbl:'6-Month'},{key:'cor5y',freq:'5y',lbl:'Corrosion 5Y'},{key:'pitot3y',freq:'3y',lbl:'Pitot 3Y'},{key:'fpr8y',freq:'8y',lbl:'Fuel Press 8Y'},{key:'vt8y',freq:'10y',lbl:'V-Tail 10Y'}];
  const ENG_CHK=[{key:'coolant2y',freq:'2y',lbl:'Coolant 2Y'},{key:'prop4y',freq:'4y',lbl:'Propeller 4Y'},{key:'rub5y',freq:'5y',lbl:'Rubber 5Y'},{key:'pres',freq:'1y',lbl:'Preservation 1Y'}];
  const GCS_CHK=[{key:'monthly',freq:'monthly',lbl:'Monthly'},{key:'qtr',freq:'3m',lbl:'Quarterly'},{key:'annual',freq:'1y',lbl:'Annual'},{key:'bat3y',freq:'3y',lbl:'UPS Batt 3Y'},{key:'cbat5y',freq:'5y',lbl:'Comp Batt 5Y'}];
  const GDT_CHK=[{key:'monthly',freq:'monthly',lbl:'Monthly'},{key:'qtr',freq:'3m',lbl:'Quarterly'},{key:'annual',freq:'1y',lbl:'Annual'},{key:'bat2y',freq:'2y',lbl:'Battery 2Y'}];
  const SAT_CHK=[{key:'sixMonthly',freq:'6m',lbl:'6-Month'}];

  // ── UAV ──
  const uavRows=d.uavs.map(u=>{
    const e=d.engines.find(x=>x.uav===u.tail);
    return`<tr><td><b>${esc(u.tail)}</b></td><td>${esc(u.site||u.loc||'—')}</td><td>${statusChip(svcTxt(u.svc),svcColor(u.svc))}</td><td>${esc(fmtHHMM(+u.fh)||'00:00')}</td><td>${e?esc(e.num):'—'}</td><td class="nd">${nextDue(u,UAV_CHK)}</td><td class="rmk">${esc(u.remarks||'')}</td></tr>`;
  }).join('');

  // ── Engines ──
  const engRows=d.engines.map(e=>`<tr><td><b>${esc(e.num)}</b></td><td>${esc(e.uav||'Storage')}</td><td>${esc(e.loc||'—')}</td><td>${statusChip(svcTxt(e.svc),svcColor(e.svc))}</td><td>${esc(fmtHHMM(+e.hrs)||'00:00')}</td><td class="nd">${nextDue(e,ENG_CHK)}</td><td class="rmk">${esc(e.remarks||'')}</td></tr>`).join('');

  // ── GCS / GDT / Satcom ──
  const gcsRows=d.gcs.map(g=>`<tr><td>GCS</td><td><b>${esc(g.unit)}</b></td><td>${esc(g.site||'—')}</td><td>${statusChip(svcTxt(g.svc),svcColor(g.svc))}</td><td class="nd">${nextDue(g,GCS_CHK)}</td><td class="rmk">${esc(g.remarks||'')}</td></tr>`).join('');
  const gdtRows=d.gdt.map(g=>`<tr><td>GDT</td><td><b>${esc(g.unit)}</b></td><td>${esc(g.site||'—')}</td><td>${statusChip(svcTxt(g.svc),svcColor(g.svc))}</td><td class="nd">${nextDue(g,GDT_CHK)}</td><td class="rmk">${esc(g.remarks||'')}</td></tr>`).join('');
  const satRows=d.satcoms.map(s=>`<tr><td>Satcom</td><td><b>${esc(s.name)}</b></td><td>${esc(s.site||'—')}</td><td>${statusChip(svcTxt(s.svc),svcColor(s.svc))}</td><td class="nd">${nextDue(s,SAT_CHK)}</td><td class="rmk">${esc(s.remarks||'')}</td></tr>`).join('');
  const groundRows=gcsRows+gdtRows+satRows;

  // ── TIFs in range ──
  const tifIn=d.tifs.filter(t=>inRange(t.date));
  const tifRows=tifIn.length?tifIn.map(t=>`<tr><td>${esc(fmtD(t.date))}</td><td>${esc(t.cat||'—')}</td><td>${esc(t.desc||'')}</td><td>${esc(t.status||'Open')}</td><td>${esc(t.remarks||'')}</td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#888">No TIFs in this period</td></tr>';

  // ── SBs in range ──
  const sbIn=d.sbs.filter(s=>inRange(s.date));
  const sbRows=sbIn.length?sbIn.map(s=>`<tr><td>${esc(s.num||'—')}</td><td>${esc(fmtD(s.date))}</td><td>${esc(s.sys||'—')}</td><td>${esc(s.desc||'')}</td><td>${esc(s.status||'Open')}</td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#888">No SBs in this period</td></tr>';

  // ── Open RMAs (all) ──
  const rmaOpen=d.rmas.filter(r=>!r.arrived);
  const rmaRows=rmaOpen.length?rmaOpen.map(r=>`<tr><td>${esc(fmtD(r.date))}</td><td>${esc(r.form||'—')}</td><td>${esc(r.tail||'—')}</td><td>${esc(r.item||'')}</td><td>${esc(r.pn||'')}</td><td>${esc(r.status||'Open')}</td><td>${r.shipped?'Yes':'No'}</td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:#888">No open RMAs</td></tr>';

  // ── Open RRQs (all) ──
  const rrqOpen=d.rrqs.filter(r=>r.status!=='Received'&&r.status!=='Closed'&&!r.arrived);
  const rrqRows=rrqOpen.length?rrqOpen.map(r=>`<tr><td>${esc(fmtD(r.date))}</td><td>${esc(r.form||'—')}</td><td>${esc(r.site||'—')}</td><td>${esc(r.item||'')}</td><td>${esc(r.pn||'')}</td><td>${esc(r.qty||'')}</td><td>${r.urgent?'<b style="color:#c62828">URGENT</b>':(r.status||'Open')}</td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:#888">No open RRQs</td></tr>';

  const svcU=d.uavs.filter(u=>u.svc==='YES').length;

  const html=`<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>OSPREY Weekly Status Report</title>
  <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
  <style>
  @page{size:A4;margin:1.6cm 1.4cm}
  body{font-family:Calibri,Arial,sans-serif;color:#222;font-size:10.5pt}
  .hdr{border-bottom:3pt solid #1f4e79;padding-bottom:10pt;margin-bottom:14pt}
  .hdr h1{color:#1f4e79;font-size:22pt;margin:0;letter-spacing:-0.5pt}
  .hdr .s1{color:#1f6feb;font-size:11pt;font-weight:bold;letter-spacing:2pt;text-transform:uppercase}
  .meta{color:#555;font-size:9.5pt;margin-top:8pt}
  .meta b{color:#1f4e79}
  h2{color:#fff;background:#1f4e79;font-size:12pt;padding:5pt 10pt;margin:18pt 0 0;border-radius:2pt}
  .kpibar{display:table;width:100%;margin:12pt 0 4pt;border-collapse:separate;border-spacing:6pt 0}
  .kpi{display:table-cell;background:#eef3fa;border:0.5pt solid #cfe0f5;border-radius:4pt;padding:8pt 6pt;text-align:center;width:25%}
  .kpi b{color:#1f4e79;font-size:17pt;display:block;line-height:1}
  .kpi span{font-size:8.5pt;color:#555;text-transform:uppercase;letter-spacing:0.5pt}
  table{border-collapse:collapse;width:100%;margin-top:4pt;margin-bottom:4pt}
  th{background:#dce6f4;color:#1f4e79;font-size:9pt;padding:5pt 7pt;text-align:left;border:0.5pt solid #b8cce4;font-weight:bold}
  td{border:0.5pt solid #ccc;padding:4pt 7pt;font-size:9pt;vertical-align:top}
  tr:nth-child(even) td{background:#f6f9fd}
  td.rmk{white-space:normal;min-width:120pt;max-width:170pt;word-wrap:break-word}
  td.nd{white-space:normal;min-width:110pt;font-size:8.5pt}
  .foot{margin-top:22pt;border-top:0.5pt solid #ccc;padding-top:8pt;font-size:8pt;color:#999;text-align:center}
  </style></head><body>
  <div class="hdr">
    <div class="s1">OSPREY · Maintenance Manager</div>
    <h1>Weekly Fleet Status Report</h1>
    <div class="meta">Hermes 900 · Thai Navy Fleet &nbsp;|&nbsp; Reporting period: <b>${fmtLong(fromV)}</b> to <b>${fmtLong(toV)}</b> &nbsp;|&nbsp; Generated: ${gen}</div>
  </div>

  <h2>1 · UAV Fleet Status</h2>
  <table><tr><th>Tail No.</th><th>Location</th><th>Status</th><th>Flight Hours</th><th>Engine</th><th>Next Due Maintenance</th><th>Remarks</th></tr>${uavRows}</table>

  <h2>2 · Engine Status</h2>
  <table><tr><th>Engine S/N</th><th>UAV</th><th>Location</th><th>Status</th><th>Engine Hours</th><th>Next Due Maintenance</th><th>Remarks</th></tr>${engRows}</table>

  <h2>3 · Ground Systems (GCS / GDT / Satcom)</h2>
  <table><tr><th>Type</th><th>Unit</th><th>Location</th><th>Status</th><th>Next Due Maintenance</th><th>Remarks</th></tr>${groundRows}</table>

  <h2>4 · TIFs — Reporting Period</h2>
  <table><tr><th>Date</th><th>System</th><th>Description</th><th>Status</th><th>Remarks</th></tr>${tifRows}</table>

  <h2>5 · Service Bulletins — Reporting Period</h2>
  <table><tr><th>SB #</th><th>Date</th><th>System</th><th>Description</th><th>Status</th></tr>${sbRows}</table>

  <h2>6 · Open RMAs (All Outstanding)</h2>
  <table><tr><th>Date</th><th>Form #</th><th>Tail</th><th>Item</th><th>Part #</th><th>Status</th><th>Shipped</th></tr>${rmaRows}</table>

  <h2>7 · Open RRQs (All Outstanding)</h2>
  <table><tr><th>Date</th><th>Form #</th><th>Site</th><th>Item</th><th>Part #</th><th>Qty</th><th>Status</th></tr>${rrqRows}</table>

  </body></html>`;

  const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`OSPREY_Weekly_Report_${fromV}_to_${toV}.doc`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('📄 Word report downloaded');
}

function page(){
  switch(S.tab){
    case'home':return pgHome();case'uav':return pgUAV();case'gcs':return pgGCS();
    case'eng':return pgEng();case'eparts':return pgEParts();case'gse':return pgGSE();
    case'pay':return pgPay();case'tif':return pgTIF();case'sb':return pgSB();
    case'rma':return pgRMA();case'rrq':return pgRRQ();case'flt':return pgFlt();
    case'settings':return pgSettings();
    default:return'';
  }
}

const LMAP={flight:'flights',fault:'faults',tif:'tifs',sb:'sbs',rma:'rmas',rrq:'rrqs',engine:'engines'};
const AMAP={'add-tif':'tif','add-sb':'sb','add-rma':'rma','add-rrq':'rrq','add-flight':'flight','add-fault':'fault','add-engine':'engine'};
const DMAP={'del-tif':'tifs','del-sb':'sbs','del-rma':'rmas','del-rrq':'rrqs','del-flight':'flights','del-fault':'faults','del-epart':'eparts','del-engine':'engines'};

function gfd(){
  const fm=document.getElementById('mf');if(!fm)return{};
  const d={};
  fm.querySelectorAll('input,select').forEach(el=>{if(!el.name)return;
    if(el.type==='number')d[el.name]=el.value===''?'':+el.value;
    else if(el.name==='hrs')d[el.name]=parseHHMM(el.value)||0;
    else d[el.name]=el.value;
  });
  ['shipped','invoice','arrived'].forEach(k=>{if(k in d)d[k]=d[k]==='YES'});
  if('urgent' in d)d.urgent=d.urgent==='YES';
  if('sentRepair' in d)d.sentRepair=d.sentRepair==='YES';
  return d;
}

function bindAll(){
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.tab=el.dataset.tab;S.moreOpen=false;render()}));
  const bnm=document.getElementById('bn-more');if(bnm)bnm.addEventListener('click',()=>{S.moreOpen=!S.moreOpen;render()});
  const mbg=document.getElementById('more-bg');if(mbg)mbg.addEventListener('click',()=>{S.moreOpen=false;render()});
  const be=document.getElementById('bxl'),bb=document.getElementById('bbk'),br=document.getElementById('brs'),ri=document.getElementById('ri');
  if(be)be.addEventListener('click',exportExcel);
  document.querySelectorAll('.blo').forEach(b=>b.addEventListener('click',()=>{if(confirm('Logout?'))logout();}));
  const stR=document.getElementById('st-report');if(stR)stR.addEventListener('click',downloadWordReport);
  const stB=document.getElementById('st-backup');if(stB)stB.addEventListener('click',backup);
  const stE=document.getElementById('st-excel');if(stE)stE.addEventListener('click',exportExcel);
  const stRs=document.getElementById('st-restore'),stRi=document.getElementById('st-ri');
  if(stRs&&stRi){stRs.addEventListener('click',()=>stRi.click());stRi.addEventListener('change',e=>{if(e.target.files[0])restore(e.target.files[0])});}
  if(bb)bb.addEventListener('click',backup);
  if(br)br.addEventListener('click',()=>ri.click());
  if(ri)ri.addEventListener('change',e=>{if(e.target.files[0])restore(e.target.files[0])});

  /* Flight live search */
  const fltSearch=document.getElementById('flt-search');
  if(fltSearch){fltSearch.addEventListener('input',()=>{
    flightFilter=fltSearch.value.toLowerCase();
    const d=S.data,fl=d.flights;
    const flSorted=[...fl].sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.id-a.id);
    const filtered=flightFilter?flSorted.filter(f=>(f.uav&&f.uav.toLowerCase().includes(flightFilter))||(f.base&&f.base.toLowerCase().includes(flightFilter))||(f.payload&&f.payload.toLowerCase().includes(flightFilter))||(f.objective&&f.objective.toLowerCase().includes(flightFilter))):flSorted;
    const tbody=document.getElementById('flt-tbody');
    if(tbody)tbody.innerHTML=filtered.map(f=>`<tr><td class="dim">${fmtD(f.date)}</td><td class="ed bld" data-ek="uav" data-id="${f.id}" data-list="flights" data-type="select_uav">${f.uav||'—'}</td><td class="ed dim" data-ek="base" data-id="${f.id}" data-list="flights" data-type="select_base">${f.base||'—'}</td><td class="ed dim" data-ek="payload" data-id="${f.id}" data-list="flights" data-type="select_payload">${f.payload||'—'}</td><td class="ed mono" data-ek="to" data-id="${f.id}" data-list="flights" data-type="text">${f.to||'—'}</td><td class="ed mono" data-ek="lnd" data-id="${f.id}" data-list="flights" data-type="text">${f.lnd||'—'}</td><td>${+f.total>0?badge(fmtHHMM(+f.total),'bgold'):`<span class="mono" style="color:var(--text2)">—</span>`}</td><td class="mono" style="color:var(--text2)">${f.engTot?fmtHHMM(+f.engTot):'—'}</td><td class="ed" data-ek="objective" data-id="${f.id}" data-list="flights" data-type="select_objective">${f.objective||'—'}</td><td class="ed ell" data-ek="remarks" data-id="${f.id}" data-list="flights" data-type="textarea" class="ell-wide">${f.remarks||'—'}</td><td><button class="btn sm danger" data-a="del-flight" data-id="${f.id}">✕</button></td></tr>`).join('')||'<tr><td colspan="11" style="text-align:center;padding:18px;color:var(--text3)">No matching flights</td></tr>';
    bindEditable();
  })}

  /* Remark tooltips */
  document.querySelectorAll('[data-remark]').forEach(el=>{
    el.addEventListener('mouseenter',e=>showRemark(e,el.dataset.remark));
    el.addEventListener('mouseleave',hideRemark);
  });

  /* Inline edit cells */
  bindEditable();

  /* Modal buttons */
  document.querySelectorAll('[data-a]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const a=el.dataset.a,id=el.dataset.id?+el.dataset.id:null;
    const d=S.data;
    if(a==='close'){S.modal=null;S.edit=null;tpClose();render();return}
    if((a.startsWith('add-')||a.startsWith('del-')||a==='save')&&!canAdmin()){
      const isOp=USER&&USER.role==='OPERATOR';
      const opOk=isOp&&(a==='add-flight'||a==='add-fault'||a==='add-epart-row'||(a==='save'&&(el.dataset.t==='flight'||el.dataset.t==='fault')));
      if(!opOk){toast('🔒 Admin only');return;}
    }
    if(a==='add-epart-row'){
      const type=el.dataset.eptype;
      const maxId=d.eparts.reduce((m,p)=>Math.max(m,p.id),0);
      d.eparts.push({id:maxId+1,type,sn:'',uav:'',engSt:'',loc:'U-Tapao',svc:'YES',itemOH:0,engOH:0,toOH:0,dateAcc:'',remarks:''});
      logAction(`Added Engine Part row (${type})`,'eparts');
      sv(d);render();toast('Row added');return;
    }
    if(a==='save'){
      const t=el.dataset.t,fd=gfd(),lk2=LMAP[t],list=d[lk2];
      if(list){
        if(S.edit&&S.edit.id){
          const idx=list.findIndex(r=>r.id===S.edit.id);
          if(idx>=0){list[idx]={...S.edit,...fd};logAction(`Edited ${LIST_NAMES[lk2]||lk2} ${unitLabel(lk2,list[idx])}`,lk2);}
        }
        else{
          const newItem={id:nid(list),...fd};
          if(t==='tif'){newItem.num=String(d.tifs.length+1);newItem.status='Open';if(!newItem.date)newItem.date=new Date().toISOString().slice(0,10);}
          list.push(newItem);
          logAction(`Added ${LIST_NAMES[lk2]||lk2} ${unitLabel(lk2,newItem)}`,lk2);
          if(t==='flight'&&newItem.est&&newItem.esd){
            const _st=parseHHMM(newItem.est),_sd=parseHHMM(newItem.esd);
            if(_st!==null&&_sd!==null){
              const _dur=+newItem.engTot||((_sd-_st)+24)%24;
              newItem.engTot=_dur;
              const _en=d.engines.find(e=>e.uav===newItem.uav);
              if(_dur>0&&_en){
                _en.hrs=(+_en.hrs||0)+_dur;
                CHANGED_KEYS.add('engines');
                logAction(`Engine ${_en.num} +${fmtHHMM(_dur)} engine time (flight ${newItem.date||''})`,'engines');
              }
            }
          }
        }
      }
      sv(d);S.modal=null;S.edit=null;render();toast('Saved!');return;
    }
    if(AMAP[a]){S.modal=AMAP[a];S.edit={};render();return}
    if(DMAP[a]){
      const list=d[DMAP[a]],idx=list.findIndex(r=>r.id===id);
      if(idx>=0&&confirm('Delete?')){list.splice(idx,1);sv(d);render();toast('Deleted.','r');}
      return;
    }
  }));
}

function bindEditable(){
  document.querySelectorAll('[data-ek]').forEach(el=>{
    if(el._bound)return;el._bound=true;
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const{ek,id,list:lk,type}=el.dataset;
      if(!ek||!id||!lk)return;
      if(!canEdit(ek,lk)){toast(USER&&USER.role==='VIEWER'?'👁 View only':'🔒 Not allowed for your role');return;}
      if(type==='checkbox_bool'){
        const list=S.data[lk];if(!list)return;
        const unit=list.find(r=>r.id===+id);if(!unit)return;
        const oldV=unit[ek];
        unit[ek]=!unit[ek];
        logChange(lk,unit,ek,oldV,unit[ek]);
        sv(S.data);render();toast('Saved!');
        return;
      }
      openPopup(el,id,lk,ek,type);
    });
  });
}

boot();
</script></body></html>
