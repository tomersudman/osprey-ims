<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Osprey IMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --bd:#30363d;--bd2:#444c56;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --blue:#1f6feb;--blue2:#388bfd;
  --green:#3fb950;--gbg:#0d2b1a;--gbd:#236b30;
  --red:#f85149;--rbg:#2d1214;--rbd:#5a2020;
  --amber:#e3b341;--abg:#271d05;
  --purple:#bc8cff;--pbg:#1e1233;--pbd:#6b3fcc;
}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{display:flex;align-items:center;padding:0 28px;height:68px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:14px;flex-shrink:0}
.ntabs{flex:1;display:flex;justify-content:center;flex-wrap:wrap;gap:2px;padding:0 20px}
.nb{background:none;border:none;color:var(--tx3);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .15s}
.nb:hover{background:var(--bg3);color:var(--tx)}
.nb.on{background:rgba(31,111,235,.12);color:var(--blue2);font-weight:600;box-shadow:inset 0 -2px 0 var(--blue)}
.main{padding:20px 32px;max-width:1280px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:12px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px}
.ctitle{font-size:13px;font-weight:500}
input,select,textarea{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);border-radius:7px;padding:0 10px;height:34px;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
textarea{height:auto;padding:8px 10px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:var(--tx3)}
select option{background:var(--bg3)}
.btn{height:34px;padding:0 14px;border-radius:7px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg4)}
.btn.bp{background:var(--blue);border-color:var(--blue);color:#fff}.btn.bp:hover{background:#1a5fcc}
.btn.bg{background:var(--gbg);border-color:var(--gbd);color:var(--green)}.btn.bg:hover{background:#1a3d23}
.btn.br{background:var(--rbg);border-color:var(--rbd);color:var(--red)}.btn.br:hover{background:#3d1619}
.btn.bpu{background:var(--pbg);border-color:var(--pbd);color:var(--purple)}
.btn.sm{height:28px;padding:0 10px;font-size:12px}
.tw{overflow-x:auto}
table{width:100%;min-width:900px;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:7px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none}
th:hover{color:var(--tx)}
th.asc::after{content:" ↑"}th.desc::after{content:" ↓"}
td{padding:7px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr.rclick{cursor:pointer}
tbody tr.rclick:hover td{background:rgba(56,139,253,.07)}
.pn{font-size:13px;color:var(--tx);font-weight:500}
.apn{font-size:11px;color:var(--tx3)}
.sn{font-size:14px;font-weight:700;padding:2px 10px;border-radius:6px;display:inline-block;min-width:36px;text-align:center}
.sok{color:var(--green);background:var(--gbg)}.slow{color:var(--amber);background:var(--abg)}.scrit{color:var(--red);background:var(--rbg)}.szero{color:var(--tx3);background:var(--bg3)}
.loctag{background:rgba(56,139,253,.1);border:1px solid rgba(56,139,253,.25);border-radius:5px;padding:2px 9px;font-size:12px;color:#e6edf3;font-weight:500;white-space:nowrap}
.tt{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500}
.ttLRU{background:#0d2a4a;color:#388bfd;border:1px solid #1f6feb}
.ttLRM{background:#271d05;color:#e3b341;border:1px solid #8a6a00}
.ttCons{background:#0d2b1a;color:#3fb950;border:1px solid #236b30}
.smrc{font-family:monospace;font-size:12px;color:var(--tx2)}
.txd{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;text-transform:uppercase}
.txdd{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.txdr{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}
.eok{color:var(--green);font-size:12px}.esoon{color:var(--amber);font-size:12px;font-weight:500}.egone{color:var(--red);font-size:12px;font-weight:500}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:20px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;width:560px;max-width:96vw;margin:auto}
.modal.narrow{width:min(380px,92vw)}
.mh{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--bd);gap:12px}
.mt{font-size:15px;font-weight:600}
.mc{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1;flex-shrink:0;padding:0}
.mc:hover{color:var(--tx)}
.mb{padding:14px 18px;max-height:72vh;overflow-y:auto}
.mf{display:flex;justify-content:flex-end;gap:8px;padding:10px 18px;border-top:1px solid var(--bd)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{grid-column:1/-1}
.fl{font-size:12px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:500}
.dg4{display:flex;align-items:stretch;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:12px}
.df{flex:1;background:transparent;border-right:1px solid var(--bd);padding:14px 10px;text-align:center}.df:last-child{border-right:none}
.dfl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;font-weight:600}
.dfv{font-size:22px;font-weight:700;line-height:1;text-align:center}
.dg2{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.df2{background:var(--bg3);border-radius:6px;padding:8px 12px;border:1px solid var(--bd)}
.dfl2{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;font-weight:600}
.dfv2{font-size:13px;font-weight:500;color:var(--tx)}
.tlh{display:grid;grid-template-columns:95px 55px 1fr 60px 70px 1fr;gap:8px;padding:6px 12px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--bd)}
.tlr{display:grid;grid-template-columns:95px 55px 1fr 60px 70px 1fr;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:12px;align-items:center}
.tlr:last-child{border-bottom:none}
.tlr:hover{background:rgba(255,255,255,.03)}
.empty{padding:32px;text-align:center;color:var(--tx3);font-size:13px}
.hide-sm{display:table-cell}
mark{background:rgba(31,111,235,.25);color:var(--blue2);border-radius:2px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* ── Mobile ── */
@media(max-width:768px){
  .topbar{height:auto;flex-wrap:wrap;padding:6px 10px;gap:6px}
  .brand{padding-left:0 !important}
  .brand img{height:36px !important}
  .brand div div:first-child{font-size:18px !important}
  .brand div div:last-child{display:none}
  .ntabs{flex:1 1 100%;order:2;overflow-x:auto;justify-content:flex-start;padding:0;gap:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .ntabs::-webkit-scrollbar{display:none}
  .nb{padding:7px 12px;font-size:14px;white-space:nowrap;flex-shrink:0}
  .main{padding:8px 10px}
  .card{border-radius:10px;margin-bottom:10px}
  .ch{padding:10px 12px;gap:6px}
  .ctitle{font-size:13px}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:0;font-size:12px}
  .hide-sm{display:none}
  .fg,.dg2{grid-template-columns:1fr}
  .ff{grid-column:1}
  .dg4{flex-wrap:wrap}
  .df{min-width:calc(50% - 1px);flex:none;padding:10px 8px}
  .dfv{font-size:18px}
  .modal{width:100% !important;border-radius:14px 14px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:92vh;animation:slideUp .2s ease}
  .ov{align-items:flex-end;padding:0;background:rgba(0,0,0,.65)}
  .mb{max-height:65vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .mf{padding:12px 14px;gap:10px}
  .mf .btn{flex:1;justify-content:center;height:44px;font-size:14px}
  .btn{height:36px}
  .btn.sm{height:30px;font-size:12px}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
}
@media(max-width:420px){
  .nb{font-size:11px;padding:5px 9px}
  .ctitle{font-size:12px}
}
</style>
</head>

        var sel = document.getElementById("login-user");
        if (sel) {
          var opts = "";
          S.users.forEach(function(u){ opts += '<option value="'+esc(u.id)+'">'+esc(u.name)+' ('+u.role+')</option>'; });
          sel.innerHTML = opts;
        }
        if(callback) callback(true);
      } else { S._syncState="err"; showSyncBadge("err"); if(callback) callback(false); }
    })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); if(callback) callback(false); });
}

// Push a single item update to Sheets (upsert)
function pushItem(item) {
  if (!syncStatus()) return;
  fetch(SCRIPT_URL, {
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({action:"saveItem", item:item})
  }).then(function(r){return r.json();})
    .then(function(d){ S._syncState="ok"; showSyncBadge("ok"); })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); });
}

// Push a single new transaction to Sheets (append)
function pushTx(tx) {
  if (!syncStatus()) return;
  fetch(SCRIPT_URL, {
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({action:"saveTx", tx:tx})
  }).then(function(r){return r.json();})
    .then(function(d){ S._syncState="ok"; showSyncBadge("ok"); })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); });
}

// Full overwrite — only used for initial data seed from Users tab
function pushToSheets() {
  if (!syncStatus()) return;
  showSyncBadge("saving");
  fetch(SCRIPT_URL, {
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({action:"saveAll", items:S.items, tx:S.tx, users:S.users, rma:S.rma})
  }).then(function(r){return r.json();})
    .then(function(d){ S._syncState=d.ok?"ok":"err"; showSyncBadge(d.ok?"ok":"err"); })
    .catch(function(){ S._syncState="err"; showSyncBadge("err"); });
}

function showSyncBadge(state) {
  var el = document.getElementById("sync-badge");
  if (!el) return;
  var cfg = {
    loading: {txt:"Syncing...",  col:"var(--amber)", bg:"var(--abg)"},
    saving:  {txt:"Saving...",   col:"var(--amber)", bg:"var(--abg)"},
    ok:      {txt:"Live",        col:"var(--green)", bg:"var(--gbg)"},
    err:     {txt:"Offline",     col:"var(--red)",   bg:"var(--rbg)"}
  };
  var c = cfg[state] || cfg.err;
  el.textContent = c.txt;
  el.style.color = c.col;
  el.style.background = c.bg;
  el.style.borderColor = c.col;
}

function startAutoSync() {
  if (!syncStatus()) return;
  if (SYNC_INTERVAL) clearInterval(SYNC_INTERVAL);
  SYNC_INTERVAL = setInterval(function(){if(!syncStatus())return;fetch(SCRIPT_URL+"?action=getAll",{method:"GET"}).then(function(r){return r.json();}).then(function(d){if(d.items&&d.items.length){S.items=d.items;S.tx=d.tx||[];S.rma=(d.rma&&d.rma.length)?d.rma:(S.rma||[]);if(d.users&&d.users.length)S.users=d.users;showSyncBadge("ok");if(S.tab!=="bulk")renderPage();}}).catch(function(){showSyncBadge("err");});},60000);
}

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var d = JSON.parse(raw);
      S.items = d.items || cp(SEED);
      S.tx    = d.tx    || [];
      S.users = d.users || cp(DEFAULT_USERS);
      S.rma   = d.rma   || [];
    } else {
      S.items = cp(SEED);
      S.tx    = [];
      S.users = cp(DEFAULT_USERS);
      S.rma   = [];
      save();
    }
  } catch(e) { S.items=cp(SEED); S.tx=[]; S.users=cp(DEFAULT_USERS); }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({items:S.items,tx:S.tx,users:S.users,rma:S.rma})); } catch(e) {}
}

// Save item locally + push just that item to Sheets
function saveAndPushItem(item) {
  save();
  showSyncBadge("saving");
  pushItem(item);
}

// Save tx locally + push just that tx to Sheets
function saveAndPushTx(tx) {
  save();
  showSyncBadge("saving");
  pushTx(tx);
}
function cp(x)  { return JSON.parse(JSON.stringify(x)); }
function gv(id) { var el=document.getElementById(id); return el?el.value:""; }
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fdate(iso) { return fd(iso); }
function fd(iso) {
  if (!iso) return "---";
  return new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}
function tod() { return new Date().toISOString().split("T")[0]; }
function uniq(f) { return[...new Set(S.items.map(function(i){return i[f];}).filter(Boolean))].sort(); }

function sst(item) {
  if (!item.qty) return "zero";
  var r = item.initialQty>0 ? item.qty/item.initialQty : 1;
  if (item.initialQty<=2) return item.qty<item.initialQty?"low":"ok";
  return r<=0.20?"crit":r<=0.40?"low":"ok";
}
function scls(item) { return{ok:"sok",low:"slow",crit:"scrit",zero:"szero"}[sst(item)]; }
function scell(item){ return'<span class="sn '+scls(item)+'">'+item.qty+'</span>'; }

function est(item) {
  if (!item.expiry) return null;
  var d = (new Date(item.expiry)-Date.now())/86400000;
  return d<0?"gone":d<=30?"soon":"ok";
}
function ecell(item) {
  var s=est(item);
  if (!s) return'<span style="color:var(--tx3);font-size:12px">---</span>';
  var cls={ok:"eok",soon:"esoon",gone:"egone"}[s];
  var pre=s==="gone"?"[!] ":s==="soon"?"[~] ":"";
  return'<span class="'+cls+'">'+pre+fd(item.expiry)+'</span>';
}

function hl(txt) {
  if (!S.search.trim()) return esc(txt);
  var q=S.search.trim().replace(/[-[\]{}()*+?.,\\^$|#]/g,"\\$&");
  return esc(String(txt)).replace(new RegExp("("+q+")","gi"),"<mark>$1</mark>");
}

function byCol(col){ if(S.sCol===col)S.sDir*=-1;else{S.sCol=col;S.sDir=1;} renderPage(); }
function thc(col) { return S.sCol===col?(S.sDir===1?"asc":"desc"):""; }

function filt() {
  var q=S.search.trim().toLowerCase();
  var items=S.items.filter(function(item){
    if(S._statFilter==="low"&&["low","crit"].indexOf(sst(item))<0)return false;
    if(S._statFilter==="zero"&&sst(item)!=="zero")return false;
    if(S._statFilter==="exp"){var se=est(item);if(se!=="soon"&&se!=="gone")return false;}
    if(!S._statFilter){
      if(q&&![item.name,item.pn,item.alt_pn||"",item.subsys||"",item.smr||""].some(function(v){return v.toLowerCase().indexOf(q)>=0;}))return false;
      if(S.fLoc&&item.location!==S.fLoc)return false;
      if(S.fSub&&item.subsys!==S.fSub)return false;
      if(S.fType&&item.type!==S.fType)return false;
      if(S.fExp){var es=est(item);if(S.fExp==="expiring"&&!(es==="soon"||es==="gone"))return false;if(S.fExp==="expired"&&es!=="gone")return false;}
    }
    return true;
  });
  if(S.sCol) items=items.slice().sort(function(a,b){
    var av=a[S.sCol],bv=b[S.sCol];
    if(S.sCol==="qty"||S.sCol==="initialQty"){av=+av||0;bv=+bv||0;}
    else{av=String(av||"").toLowerCase();bv=String(bv||"").toLowerCase();}
    return av<bv?-S.sDir:av>bv?S.sDir:0;
  });
  return items;
}

function wk() {
  var n=new Date(),d=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-(d===0?6:d-1)); m.setHours(0,0,0,0);
  var s=new Date(m); s.setDate(m.getDate()+6); s.setHours(23,59,59,999);
  return[m,s];
}
function mo() { var n=new Date(); return[new Date(n.getFullYear(),n.getMonth(),1),new Date(n.getFullYear(),n.getMonth()+1,0,23,59,59)]; }
function inr(t,r) { var d=new Date(t.date); return d>=r[0]&&d<=r[1]; }

function showLogin(){
  var ur="";
  S.users.forEach(function(u){var rc=u.role==="admin"?"var(--blue2)":u.role==="operator"?"var(--green)":"var(--tx3)";ur+='<div class="login-user-row" data-uid="'+esc(u.id)+'" style="display:flex;flex-direction:column;align-items:center;padding:14px 8px;border-radius:8px;cursor:pointer;background:var(--bg3);border:1px solid var(--bd);border-top:3px solid '+rc+';text-align:center"><div style="font-weight:700;font-size:15px;color:var(--tx)">'+esc(u.name)+'</div></div>';});
  showModal('<div class="mh" style="padding-bottom:6px"><div><div class="mt">Sign in</div><div style="font-size:12px;color:var(--tx2)">Select user then enter PIN</div></div></div><div class="mb"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">'+ur+'</div><div id="login-pin-section" style="display:none"><label class="fl">PIN for <span id="login-selected-name" style="color:var(--blue2)"></span></label><input id="login-pin" type="password" placeholder="Enter PIN" style="width:100%" maxlength="8" autocomplete="off"><input type="hidden" id="login-user"></div><div id="login-err" style="color:var(--red);font-size:12px;margin-top:8px;display:none">Incorrect PIN.</div></div><div class="mf"><button class="btn bp" id="btn-login" style="display:none">Sign in</button></div>',true,true);
}

function doLogin() {
  var uid=gv("login-user"), pin=gv("login-pin");
  var user=S.users.find(function(u){return u.id===uid;});
  if (!user||user.pin!==pin) {
    var err=document.getElementById("login-err");
    if(err){err.style.display="block";}
    return;
  }
  S.currentUser=user;
  var sn2=localStorage.getItem("osprey_name_"+user.id);
  if(sn2){S._fullName=sn2;closeModal();updateRoleBadge();renderAll();}
  else{closeModal();setTimeout(function(){var fn=prompt("Welcome, "+user.name+"!\nEnter your full name:",user.name);S._fullName=(fn&&fn.trim())?fn.trim():user.name;localStorage.setItem("osprey_name_"+user.id,S._fullName);updateRoleBadge();renderAll();},200);updateRoleBadge();renderAll();}
  // If came from QR scan, open that item automatically
  if (S._deepLinkItemId) {
    var dlItem = S.items.find(function(i){ return i.id === S._deepLinkItemId; });
    if (dlItem) {
      S.modal = {type:"detail", id:S._deepLinkItemId};
      showModal(detailHTML(dlItem));
    }
    S._deepLinkItemId = null;
  }
}

function doLogout() {
  S.currentUser=null;
  renderAll();
  showLogin();
}

function updateRoleBadge() {
  var wb=document.getElementById("welcome-block"),wn=document.getElementById("welcome-name");
  var wr=document.getElementById("welcome-role"),rb=document.getElementById("role-badge");
  if(!wb)return;
  if(!S.currentUser){wb.style.display="none";if(rb){rb.style.display="inline";rb.textContent="Sign in";rb.style.cssText="font-size:11px;padding:3px 10px;border-radius:12px;background:var(--bg3);border:1px solid var(--bd);color:var(--tx3);cursor:pointer";}return;}
  if(!S._fullName){var st=localStorage.getItem("osprey_name_"+S.currentUser.id);if(st)S._fullName=st;}
  var dn=S._fullName||S.currentUser.name;
  var rl=S.currentUser.role.charAt(0).toUpperCase()+S.currentUser.role.slice(1);
  var rc=S.currentUser.role==="admin"?"var(--blue2)":S.currentUser.role==="operator"?"var(--green)":"var(--tx3)";
  wb.style.display="block";
  if(wn)wn.innerHTML="Welcome, <span style='cursor:pointer;opacity:.85' onclick='_editName()'>"+dn+"</span>";
  if(wr)wr.innerHTML="<span style='color:"+rc+";font-weight:600'>"+rl+"</span>";
  if(rb)rb.style.display="none";
}

// ── QR renderer: decode packed matrix and draw to canvas ─────────────────────
function getQRForItem(itemId) {
  return QR_MAP[String(itemId)] || null;
}

function drawQRFromPacked(canvas, packed) {
  // Decode: base64 -> bytes, first byte = SIZE, rest = bit-packed matrix
  var b64 = packed;
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  var SIZE = bytes[0];
  var CANVAS_PX = 280;
  var QUIET = 4; // modules
  var cell = Math.floor(CANVAS_PX / (SIZE + QUIET * 2));
  var offset = Math.floor((CANVAS_PX - cell * SIZE) / 2);
  canvas.width = CANVAS_PX;
  canvas.height = CANVAS_PX;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CANVAS_PX, CANVAS_PX);
  ctx.fillStyle = '#000000';
  var byteIdx = 1, bitIdx = 7;
  for (var r = 0; r < SIZE; r++) {
    for (var c = 0; c < SIZE; c++) {
      var bit = (bytes[byteIdx] >> bitIdx) & 1;
      bitIdx--;
      if (bitIdx < 0) { bitIdx = 7; byteIdx++; }
      if (bit) ctx.fillRect(offset + c*cell, offset + r*cell, cell, cell);
    }
  }
}

function makeQR(text) {
  return '<div id="qr-canvas-wrap" data-qr="'+encodeURIComponent(text)+'" style="width:280px;height:280px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:4px;margin:0 auto"><span style="color:#aaa;font-size:12px">Loading...</span></div>';
}

function renderQRIntoDOM() {
  var wrap = document.getElementById('qr-canvas-wrap');
  if (!wrap) return;
  var text = decodeURIComponent(wrap.getAttribute('data-qr'));
  // Extract item ID from URL
  var match = text.match(/[?&]item=([^&]+)/);
  var itemId = match ? match[1] : null;
  var packed = itemId ? getQRForItem(itemId) : null;
  var canvas = document.createElement('canvas');
  canvas.style.display = 'block';
  canvas.style.borderRadius = '4px';
  if (packed) {
    drawQRFromPacked(canvas, packed);
    wrap.innerHTML = '';
    wrap.style.width = '280px';
    wrap.style.height = '280px';
    wrap.appendChild(canvas);
  } else {
    // Fallback for new items not in map: show URL as text
    var apiUrl="https://chart.googleapis.com/chart?chs=280x280&cht=qr&chl="+encodeURIComponent(text)+"&choe=UTF-8&chld=M|2";
    var img=document.createElement("img");
    img.width=280;img.height=280;
    img.style.cssText="border:8px solid #fff;border-radius:4px;display:block;margin:0 auto";
    img.onerror=function(){wrap.innerHTML='<div style="padding:12px;font-size:10px;color:#333;word-break:break-all;background:#fff;width:280px;text-align:center;border-radius:4px"><b>QR Code</b><br><br><span style="font-size:8px">'+esc(text)+'</span></div>';};
    img.src=apiUrl;
    wrap.innerHTML="";wrap.style.width="280px";wrap.style.height="280px";
    wrap.appendChild(img);
  }
}


function showLabel(id) {
  var item=S.items.find(function(i){return i.id===id;});
  if(!item)return;
  // Encode the app URL with item ID so scanning opens the app to that item
  var baseUrl = window.location.href.split("?")[0].split("#")[0];
  var deepLink = baseUrl + "?item=" + encodeURIComponent(item.id);
  var qr = makeQR(deepLink);
  showModal(
    '<div class="mh"><div><div class="mt">Label & QR Code</div><div style="font-size:12px;color:var(--tx2);margin-top:3px">'+esc(item.pn)+'</div></div>'+
    '<button class="mc" id="modal-close-btn">x</button></div>'+
    '<div class="mb"><div class="qr-box">'+
    '<div class="qr-svg" style="text-align:center;margin:12px 0">'+qr+'</div>'+
    '<div style="font-size:18px;font-weight:700;margin:10px 0 4px">'+esc(item.pn)+'</div>'+
    '<div style="font-size:13px;color:var(--tx2);margin-bottom:6px">'+esc(item.name)+'</div>'+
    '<div style="font-size:12px;color:var(--tx3)">'+esc(item.location)+(item.floor&&item.floor!=="0"?' / Floor '+item.floor:'')+'</div>'+
    (item.type?'<div style="font-size:12px;color:var(--tx3);margin-top:4px">'+item.type+(item.smr?' / SMR: '+esc(item.smr):'')+'</div>':'')+
    '<div style="margin-top:10px;background:var(--bg3);border-radius:6px;padding:8px;font-size:10px;color:var(--tx3);word-break:break-all">Scan opens app to this item</div>'+
    '</div></div>'+
    '<div class="mf"><button class="btn" id="btn-print-label" style="margin-right:auto">Print label</button><button class="btn" id="modal-close-btn2">Close</button></div>'
  );
  document.getElementById("btn-print-label").onclick=function(){ doPrintLabel(item); };
  // Render QR into DOM now that modal is in place
  setTimeout(function(){ renderQRIntoDOM(); }, 10);
}

function doPrintLabel(item) {
  // Get the canvas from the modal QR target
  var wrap = document.getElementById("qr-canvas-wrap");
  var canvas = wrap ? wrap.querySelector("canvas") : null;

// ── LOCATION MAP ──────────────────────────────────────────────────────────────
function renderMap() {
  var byLoc={};
  S.items.forEach(function(item){
    var loc=item.location||"Unknown";
    if(!byLoc[loc]) byLoc[loc]={};
    var fl=item.floor||"General";
    if(!byLoc[loc][fl]) byLoc[loc][fl]=[];
    byLoc[loc][fl].push(item);
  });
  var locs=Object.keys(byLoc).sort();
  var html='<div class="card"><div class="ch"><div class="ctitle">Location Map</div>'
    +'<span style="font-size:12px;color:var(--tx2)">Click any item to view details</span></div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:18px">';
  locs.forEach(function(loc){
    var floors=Object.keys(byLoc[loc]).sort();
    var totalItems=0;
    floors.forEach(function(fl){totalItems+=byLoc[loc][fl].length;});
    var lowStock=0;
    floors.forEach(function(fl){byLoc[loc][fl].forEach(function(i){if(i.qty<=2)lowStock++;});});
    var badge=lowStock?'<span style="background:var(--rbg);color:var(--red);border:1px solid var(--rbd);border-radius:10px;font-size:10px;padding:1px 6px;margin-left:6px">'+lowStock+' low</span>':'<span style="background:var(--gbg);color:var(--green);border:1px solid var(--gbd);border-radius:10px;font-size:10px;padding:1px 6px;margin-left:6px">ok</span>';
    html+='<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:10px;overflow:hidden">';
    html+='<div style="padding:10px 14px;font-size:12px;font-weight:600;background:var(--bg4);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">'
      +'<span>'+esc(loc)+'</span>'+badge+'</div>';
    floors.forEach(function(fl){
      html+='<div style="padding:8px 14px;border-bottom:1px solid var(--bd)">';
      if(fl!=="General") html+='<div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">Floor '+esc(fl)+'</div>';
      byLoc[loc][fl].forEach(function(item){
        var sc=item.qty===0?"var(--red)":item.qty<=2?"var(--amber)":"var(--green)";
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;cursor:pointer" data-action="detail" data-id="'+esc(item.id)+'">'
          +'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px" title="'+esc(item.name)+'">'+esc(item.name)+'</span>'
          +'<span style="color:'+sc+';font-weight:700;margin-left:8px;flex-shrink:0">'+item.qty+'</span>'
          +'</div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });
  html+='</div></div>';
  return html;
}

function doAddUser() {
  var name=gv("u-name").trim(), pin=gv("u-pin").trim(), role=gv("u-role");
  if(!name){alert("Enter a name.");return;}
  if(!pin||pin.length<4){alert("PIN must be at least 4 digits.");return;}
  S.users.push({id:String(Date.now()),name:name,pin:pin,role:role});
  save();
  if(syncStatus()){showSyncBadge("saving");fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"saveUsers",users:S.users})}).then(function(r){return r.json();}).then(function(){showSyncBadge("ok");}).catch(function(){showSyncBadge("err");});}
  closeModal(); renderAll();
}

function delUser(id) {
  if(!confirm("Remove this user?"))return;
  S.users=S.users.filter(function(u){return u.id!==id;});
  save(); renderAll();
}

function parseBulkPaste(){
  var table=document.getElementById("bulk-tbody");
  if(!table){alert("Table not found.");return;}
  var rows=[];
  table.querySelectorAll("tr").forEach(function(tr){var v=Array.from(tr.querySelectorAll("input.bulk-cell")).map(function(inp){return inp.value.trim();});if(v.some(function(x){return x;}))rows.push({name:v[0]||"",pn:v[1]||"",alt_pn:v[2]||"",sn:v[3]||"",qty:parseInt(v[4])||1,type:v[5]||"",subsys:v[6]||"",expiry:v[7]||"",smr:v[8]||"",notes:v[9]||""});});
  if(!rows.length){alert("No data entered.");return;}
  var res=rows.map(function(row){
    // Normalize for comparison - trim + lowercase
    var rpn=(row.pn||'').trim().toLowerCase();
    var rname=(row.name||'').trim().toLowerCase();
    // Exact match: same PN AND same name (case-insensitive)
    var ex=rpn?S.items.find(function(i){return (i.pn||'').trim().toLowerCase()===rpn&&(i.name||'').trim().toLowerCase()===rname;}):null;
    if(ex)return{row:row,status:"exact",match:ex,location:ex.location};
    // Same PN, different name
    var pm=rpn?S.items.find(function(i){return (i.pn||'').trim().toLowerCase()===rpn;}):null;
    if(pm)return{row:row,status:"cpn",match:pm,reason:"Same PN, diff desc: "+esc(pm.name),location:pm.location};
    // Same name, different PN
    var nm=rname?S.items.find(function(i){return (i.name||'').trim().toLowerCase()===rname;}):null;
    if(nm)return{row:row,status:"cname",match:nm,reason:"Same desc, diff PN: "+esc(nm.pn),location:nm.location};
    return{row:row,status:"new",match:null,location:""};
  });
  _bulkMatches=res;
  var nN=res.filter(function(r){return r.status==="new";}).length,nU=res.filter(function(r){return r.status==="exact";}).length,nC=res.filter(function(r){return r.status!=="new"&&r.status!=="exact";}).length;
  var html='<div style="margin-top:10px;background:var(--bg3);border-radius:8px;padding:14px"><div style="font-size:13px;margin-bottom:12px"><b>'+res.length+' rows:</b> <span style="color:var(--green)">'+nN+' new</span> &nbsp;<span style="color:var(--blue2)">'+nU+' update</span> &nbsp;<span style="color:var(--amber)">'+nC+' review</span></div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--bg4)"><th style="padding:5px 8px">Include</th><th>Description</th><th>Part No.</th><th>Qty</th><th>Location</th><th>Status</th></tr></thead><tbody>';
  res.forEach(function(r,i){
    var sc=r.status==="new"?"var(--green)":r.status==="exact"?"var(--blue2)":"var(--amber)";
    var sl=r.status==="new"?"NEW":r.status==="exact"?"UPDATE QTY":"REVIEW";
    var chk=(r.status==="cpn"||r.status==="cname")?"":"checked";
    var locCell=r.status==="new"?'<input type="text" id="bulk-loc-'+i+'" placeholder="Location *" style="width:100px;height:24px;padding:0 6px;font-size:11px;background:var(--bg);border:1px solid var(--amber);color:var(--tx);border-radius:3px">':'<span class="loctag">'+esc(r.location||"?")+'</span>';
    html+='<tr style="border-bottom:1px solid var(--bd)"><td style="padding:5px 8px;text-align:center"><input type="checkbox" class="bulk-skip-cb" data-idx="'+i+'" '+chk+'></td><td style="padding:5px 8px">'+esc(r.row.name)+'</td><td style="padding:5px 8px"><span class="pn">'+esc(r.row.pn)+'</span></td><td style="padding:5px 8px;text-align:center;font-weight:600">'+r.row.qty+'</td><td style="padding:5px 8px">'+locCell+'</td><td style="padding:5px 8px"><span style="color:'+sc+';font-weight:600">'+sl+'</span>'+(r.reason?'<div style="font-size:10px;color:var(--amber)">'+r.reason+'</div>':"")+'</td></tr>';
  });
  html+='</tbody></table></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn bp" id="btn-bulk-confirm">Import checked rows</button><button class="btn" id="btn-bulk-back">Back</button></div></div>';
  document.getElementById("bulk-preview").innerHTML=html;
  document.getElementById("bulk-preview").scrollIntoView({behavior:"smooth",block:"start"});
}

function executeBulkImport(){
  if(!_bulkMatches.length){alert("Run preview first.");return;}
  var missingLoc=false;
  _bulkMatches.forEach(function(r,i){if(r.status==="new"){var cb=document.querySelector(".bulk-skip-cb[data-idx='"+i+"']");if(cb&&cb.checked){var li=document.getElementById("bulk-loc-"+i);if(li&&!li.value.trim())missingLoc=true;}}});
  if(missingLoc){alert("Please enter location for all new items.");return;}
  var skip={};document.querySelectorAll(".bulk-skip-cb").forEach(function(cb){if(!cb.checked)skip[cb.getAttribute("data-idx")]=true;});
  var ad=0,up=0,sk=0;
  _bulkMatches.forEach(function(r,i){
    if(skip[i]){sk++;return;}
    if(r.status==="exact"){r.match.qty+=r.row.qty;up++;}
    else{var loc=r.location||"Unknown";if(r.status==="new"){var li=document.getElementById("bulk-loc-"+i);if(li)loc=li.value.trim()||"Unknown";}
    S.items.push({id:String(Date.now()+i*7),pn:r.row.pn||"---",alt_pn:r.row.alt_pn,name:r.row.name,subsys:r.row.subsys,type:r.row.type,smr:r.row.smr,sn:r.row.sn,location:loc,floor:"",expiry:r.row.expiry,notes:r.row.notes,qty:r.row.qty,initialQty:r.row.qty});ad++;}
  });
  if(ad>0){var arrDate=(document.getElementById("bulk-arrival-date")||{}).value||tod();S.items.slice(S.items.length-ad).forEach(function(item){S.tx.push({id:String(Date.now()+(Math.random()*999|0)),itemId:item.id,itemName:item.name,type:"receive",qty:item.qty,date:arrDate,person:S._fullName||"Shipment Import",purpose:"Shipment import",reasonCode:"Import",remaining:item.qty,ts:Date.now()});});}
  save();_bulkMatches=[];if(syncStatus()){showSyncBadge("saving");pushToSheets();}
  alert("Done!\n\u2713 "+ad+" added\n\u2713 "+up+" updated\n\u23ed "+sk+" skipped");
  setTab("inventory");
}

  if(t.id==="btn-clear"){S.search="";S.fLoc="";S.fSub="";S.fType="";S.fExp="";S._statFilter=null;renderPage();return;}
  if(t.id==="btn-rpt-apply"){S._rptFrom=gv("rpt-from");S._rptTo=gv("rpt-to");renderPage();return;}
  if(t.id==="btn-rpt-excel"){exportRptExcel();return;}
  if(t.id==="btn-rpt-word"){exportRptWord();return;}
  if(t.id==="btn-rpt-excel"){exportRptExcel();return;}
  if(t.id==="btn-rpt-word"){exportRptWord();return;}
  if(t.id==="btn-clearstatf"){S._statFilter=null;renderPage();return;}
  if(t.id==="btn-xcsv"){xcsv();return;}
  if(t.id==="btn-add"){if(!canEdit())return;S.modal={type:"add"};showModal(buildItemModal(null));return;}
  if(t.id==="btn-xtcsv"){xtcsv();return;}
  if(t.id==="btn-adduser"){if(!canAdmin())return;showModal(buildAddUserModal());return;}
  if(t.id==="btn-bulk-import"){parseBulkPaste();return;}
  if(t.id==="btn-bulk-confirm"){executeBulkImport();return;}
  if(t.id==="btn-bulk-back"){document.getElementById("bulk-preview").innerHTML="";return;}
  if(t.id==="btn-bulk-clear"){document.querySelectorAll(".bulk-cell").forEach(function(inp){inp.value="";});document.getElementById("bulk-preview").innerHTML="";return;}
  if(t.id==="btn-bulk-addrows"){S._bulkTableRows=(S._bulkTableRows||20)+10;renderPage();return;}
  if(t.id==="btn-confirm-ship"){var rec3=S.rma.find(function(r){return r.id===S._pendingShipId;});var dt=(document.getElementById("ship-date")||{}).value;if(!dt){alert("Select a date.");return;}if(rec3){rec3.status="shipped";rec3.dateShipped=dt;rec3.location="Israel";save();closeModal();renderAll();}return;}
  if(t.id==="btn-confirm-recv"){
  var rec4=S.rma.find(function(r){return r.id===S._pendingRecvId;});
  var dt2=(document.getElementById("recv-date")||{}).value;
  if(!dt2){alert("Select a date.");return;}
  if(!rec4){alert("Record not found.");return;}
  rec4.status="received";
  rec4.dateReceived=dt2;
  var snIn2=(document.getElementById("recv-sn")||{}).value||rec4.sn;
  var loc4=(document.getElementById("recv-loc")||{}).value||"";
  rec4.snReceived=snIn2;
  var item4=S.items.find(function(i){return i.id===rec4.itemId;});
  if(item4){
    item4.qty=Number(item4.qty||0)+1;
    if(loc4)item4.location=loc4;
    if(snIn2&&snIn2!==rec4.sn)item4.sn=snIn2;
    saveAndPushItem(item4);
  }
  var tx4={id:String(Date.now()),itemId:rec4.itemId||"",itemName:rec4.itemName,
    type:"receive",qty:1,date:dt2,person:S._fullName||"Repair",
    purpose:"Repair return - "+rec4.rmaNum,reasonCode:"Return",
    remaining:item4?item4.qty:0,ts:Date.now()};
  S.tx.push(tx4);
  saveAndPushTx(tx4);
  save();
  // Push full data to sheets so rma status persists
  if(syncStatus()){showSyncBadge("saving");pushToSheets();}
  closeModal();
  S._rmaHistory=true;
  renderAll();
  alert("Received back!"+(item4?" Qty now: "+item4.qty+".":""));
return;}
  if(t.id==="btn-rma-open"){if(!canEdit())return;openRMAModal(null);return;}
  if(t.id==="btn-rma-toggle"){S._rmaHistory=!S._rmaHistory;renderPage();return;}
  if(t.id==="btn-rma-submit"){submitRMA();return;}
  if(t.closest("[data-action='rma-ship']")){shipRMA(t.closest("[data-action='rma-ship']").getAttribute("data-id"));return;}
  if(t.closest("[data-action='rma-receive']")){receiveRMA(t.closest("[data-action='rma-receive']").getAttribute("data-id"));return;}
  if(t.id==="btn-pushall"){if(!canAdmin())return;if(confirm("Push ALL current data to Google Sheets? This will overwrite the sheet with your current data."))pushToSheets();return;}
  if(t.id==="btn-saveuser"){doAddUser();return;}
  if(t.id==="btn-login"){doLogin();return;}
  // btn-change-user removed
  var urow = t.closest(".login-user-row");
  if(urow){
    var uid=urow.getAttribute("data-uid");
    var uname=S.users.find(function(u){return u.id===uid;});
    document.getElementById("login-user").value=uid;
    document.getElementById("login-selected-name").textContent=uname?uname.name:"";
    document.getElementById("login-pin-section").style.display="block";
    document.getElementById("btn-login").style.display="inline-flex";
    document.getElementById("login-err").style.display="none";
    document.getElementById("login-pin").value="";
    setTimeout(function(){document.getElementById("login-pin").focus();},50);
    return;
  }

  // --- modal close buttons ---
  if(t.id==="modal-close-btn"||t.id==="modal-close-btn2"){closeModal();return;}

  // --- modal submit buttons ---
  if(t.id==="btn-submit-tx"){submitTx();return;}
  if(t.id==="btn-submit-item"){submitItem(t.getAttribute("data-id")||null);return;}

  // --- detail modal action buttons ---
  if(t.id==="btn-draw-item"){var did=t.getAttribute("data-id");closeModal();S.modal={type:"draw",id:did};showModal(buildTxModal(did,"draw"));return;}
  if(t.id==="btn-recv-item"){var rid=t.getAttribute("data-id");closeModal();S.modal={type:"receive",id:rid};showModal(buildTxModal(rid,"receive"));return;}
  if(t.id==="btn-edit-item"){var eid=t.getAttribute("data-id");closeModal();S.modal={type:"edit",id:eid};showModal(buildItemModal(eid));return;}
  if(t.id==="btn-label-item"){showLabel(t.getAttribute("data-id"));return;}
  if(t.id==="btn-print-label"){return;} // handled by onclick set in showLabel

  // --- data-action elements (rows, draw/recv buttons in table) ---
  var el=t.closest("[data-action]");
  if(el){
    var a=el.getAttribute("data-action"), id=el.getAttribute("data-id");
    if(a==="detail"){
      var item=S.items.find(function(i){return i.id===id;});
      if(item){S.modal={type:"detail",id:id};showModal(detailHTML(item));}
      return;
    }
    if(a==="draw"){if(!canEdit())return;S.modal={type:"draw",id:id};showModal(buildTxModal(id,"draw"));return;}
    if(a==="receive"){if(!canEdit())return;S.modal={type:"receive",id:id};showModal(buildTxModal(id,"receive"));return;}
    if(a==="delUser"){delUser(id);return;}
    return;
  }

  // --- sort column headers ---
  var th=t.closest("th[data-sort]");
  if(th){byCol(th.getAttribute("data-sort"));return;}
});

document.addEventListener("change",function(ev){
  var id=ev.target.id;
  if(id==="fLoc"){S.fLoc=ev.target.value;renderPage();}
  else if(id==="fSub"){S.fSub=ev.target.value;renderPage();}
  else if(id==="fType"){S.fType=ev.target.value;renderPage();}
  else if(id==="fExp"){S.fExp=ev.target.value;renderPage();}
});

document.addEventListener("input",function(ev){
  if(ev.target.id==="srch"){
    S.search=ev.target.value;S._searchFocused=true;
    var pos=ev.target.selectionStart;
    renderPage();
    var inp=document.getElementById("srch");

  }

});
document.addEventListener("input",function(ev){
  if(ev.target.id==="log-person-filter"){
    S._logPerson=ev.target.value;
    var p=ev.target.selectionStart;renderPage();
    var el=document.getElementById("log-person-filter");
    if(el){el.focus();try{el.setSelectionRange(p,p);}catch(e){}}
  }

document.addEventListener("paste",function(ev){
  var ac=document.activeElement;if(!ac||!ac.classList.contains("bulk-cell"))return;ev.preventDefault();
  var text=(ev.clipboardData||window.clipboardData).getData("text");
  var sr=parseInt(ac.getAttribute("data-row"))||0,sc5=parseInt(ac.getAttribute("data-col"))||0;
  var lines=text.split("\n");while(lines.length&&!lines[lines.length-1].trim())lines.pop();
  for(var ri=0;ri<lines.length;ri++){var cv=lines[ri].split("\t");for(var ci2=0;ci2<cv.length;ci2++){var inp=document.querySelector(".bulk-cell[data-row='"+(sr+ri)+"'][data-col='"+(sc5+ci2)+"']");if(inp)inp.value=cv[ci2].replace(/^"|"$/g,"").trim();}}
});
var _bSel={active:false,r1:-1,c1:-1,r2:-1,c2:-1};
function _bHi(){document.querySelectorAll(".bulk-cell").forEach(function(el){el.style.background="var(--bg)";});if(_bSel.r1<0)return;var r1=Math.min(_bSel.r1,_bSel.r2),r2=Math.max(_bSel.r1,_bSel.r2),c1=Math.min(_bSel.c1,_bSel.c2),c2=Math.max(_bSel.c1,_bSel.c2);for(var r=r1;r<=r2;r++)for(var cv=c1;cv<=c2;cv++){var el=document.querySelector(".bulk-cell[data-row='"+r+"'][data-col='"+cv+"']");if(el)el.style.background="rgba(31,111,235,.25)";}}
document.addEventListener("mousedown",function(ev){var t=ev.target;if(!t||!t.classList.contains("bulk-cell"))return;var r=parseInt(t.getAttribute("data-row")),cv=parseInt(t.getAttribute("data-col"));if(ev.shiftKey&&_bSel.r1>=0){_bSel.r2=r;_bSel.c2=cv;_bHi();ev.preventDefault();return;}_bSel={active:true,r1:r,c1:cv,r2:r,c2:cv};document.querySelectorAll(".bulk-cell").forEach(function(el){el.style.background="var(--bg)";});});
document.addEventListener("mousemove",function(ev){if(!_bSel.active)return;var t=document.elementFromPoint(ev.clientX,ev.clientY);if(!t||!t.classList.contains("bulk-cell"))return;var r=parseInt(t.getAttribute("data-row")),cv=parseInt(t.getAttribute("data-col"));if(r!==_bSel.r2||cv!==_bSel.c2){_bSel.r2=r;_bSel.c2=cv;_bHi();}});
document.addEventListener("mouseup",function(){_bSel.active=false;});
document.addEventListener("keydown",function(ev){
  if(!document.getElementById("bulk-table"))return;
  var ac=document.activeElement;
  if(ev.ctrlKey&&ev.key==="c"&&_bSel.r1>=0){var r1=Math.min(_bSel.r1,_bSel.r2),r2=Math.max(_bSel.r1,_bSel.r2),c1=Math.min(_bSel.c1,_bSel.c2),c2=Math.max(_bSel.c1,_bSel.c2);var rows2=[];for(var r=r1;r<=r2;r++){var cols2=[];for(var cv2=c1;cv2<=c2;cv2++){var el=document.querySelector(".bulk-cell[data-row='"+r+"'][data-col='"+cv2+"']");cols2.push(el?el.value:"");}rows2.push(cols2.join("\t"));}navigator.clipboard.writeText(rows2.join("\n")).catch(function(){});return;}
  if(!ac||!ac.classList.contains("bulk-cell"))return;
  var crow=parseInt(ac.getAttribute("data-row")),ccol=parseInt(ac.getAttribute("data-col")),nxt=null;
  if(ev.key==="Tab"){ev.preventDefault();nxt=document.querySelector(".bulk-cell[data-row='"+crow+"'][data-col='"+(ccol+1)+"']")||document.querySelector(".bulk-cell[data-row='"+(crow+1)+"'][data-col='0']");}
  else if(ev.key==="Enter"){nxt=document.querySelector(".bulk-cell[data-row='"+(crow+1)+"'][data-col='"+ccol+"']");}
  else if(ev.key==="ArrowRight"&&!ev.shiftKey){nxt=document.querySelector(".bulk-cell[data-row='"+crow+"'][data-col='"+(ccol+1)+"']");}
  else if(ev.key==="ArrowLeft"&&!ev.shiftKey){nxt=document.querySelector(".bulk-cell[data-row='"+crow+"'][data-col='"+(ccol-1)+"']");}
  else if(ev.key==="ArrowDown"){nxt=document.querySelector(".bulk-cell[data-row='"+(crow+1)+"'][data-col='"+ccol+"']");}
  else if(ev.key==="ArrowUp"){nxt=document.querySelector(".bulk-cell[data-row='"+(crow-1)+"'][data-col='"+ccol+"']");}
  if(nxt){nxt.focus();ev.preventDefault();}
});
document.addEventListener("focusout",function(ev){
  if(ev.target.id==="srch") S._searchFocused=false;
});
document.addEventListener("keydown",function(ev){

load(); // load from localStorage first (instant)
renderAll();
updateRoleBadge();
// Then pull live data from Google Sheets (if configured)
if (syncStatus()) {
  document.getElementById("sync-badge").style.display = "inline";
  showSyncBadge("loading");
  // Fast startup sync - no cold-start delay
  showSyncBadge("loading");
  fetch(SCRIPT_URL+"?action=getAll",{method:"GET",cache:"no-store"})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.items&&d.items.length){
        S.items=d.items; S.tx=d.tx||[];
        S.rma=(d.rma&&d.rma.length)?d.rma:(S.rma||[]);
        if(d.users&&d.users.length)S.users=d.users;
        showSyncBadge("ok"); save(); renderAll();
      } else { showSyncBadge("ok"); }
      startAutoSync();
      checkDeepLink();
    }).catch(function(){
      showSyncBadge("err");
      startAutoSync();
      checkDeepLink();
    });
} else {
  checkDeepLink();
}
showLogin();

function checkDeepLink() {
  // If URL has ?item=ID, open that item's detail panel after login
  var params = new URLSearchParams(window.location.search);
  var itemId  = params.get("item");
  if (!itemId) return;
  var item = S.items.find(function(i){ return i.id === itemId; });
  if (!item) return;
  // Store for use after login
  S._deepLinkItemId = itemId;
  // Show a banner
  var banner = document.createElement("div");
  banner.style.cssText = "position:fixed;top:0;left:0;right:0;background:var(--blue);color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:500;z-index:300";
  banner.textContent = "Scan detected: " + item.pn + " — " + item.name + ". Sign in to view.";
  document.body.appendChild(banner);
  setTimeout(function(){ if(banner.parentNode) banner.parentNode.removeChild(banner); }, 5000);
}
